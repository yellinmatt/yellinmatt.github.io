<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Train">
<meta name="theme-color" content="#F7F8FA">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Train</title>
<style>
:root{
  --bg:#F7F8FA; --surface:#FFFFFF; --surface-2:#F0F1F3;
  --ink:#0E1116; --sub:#6B7280; --faint:#767C86; --white:#FFFFFF;
  --line:#EAECEF; --line-2:#E1E4E8;
  --accent:#FF4E2B; --accent-press:#E63E1E; --accent-tint:#FFEDE8;
  --good:#16A34A; --good-tint:#E7F6EC;
  --shadow:0 1px 2px rgba(16,17,22,.04), 0 4px 16px rgba(16,17,22,.06);
  --shadow-lg:0 8px 40px rgba(16,17,22,.16);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  --r-card:16px; --r-btn:14px; --r-field:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--ink);font:16px/1.45 var(--sans);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  -webkit-user-select:none;user-select:none;overscroll-behavior-y:none;
  padding-top:env(safe-area-inset-top);
  min-height:100vh;
}
button,input{font-family:inherit;color:inherit}
button{touch-action:manipulation;border:0;background:none;cursor:pointer}
input{border:0;background:none}
.num{font-variant-numeric:tabular-nums}
.app{max-width:520px;margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom));position:relative}
.view{display:none;animation:fade .22s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---- top header ---- */
.head{display:flex;align-items:center;justify-content:space-between;padding:16px 2px 14px}
.head .date{font-size:14px;font-weight:600;color:var(--sub)}
.head .title{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-top:1px}
.streak{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:8px 13px 8px 11px;box-shadow:var(--shadow)}
.streak svg{width:16px;height:16px}
.streak b{font-size:15px;font-weight:800;color:var(--ink)}
.streak span{font-size:12px;font-weight:600;color:var(--sub)}

/* ---- hero card ---- */
.hero{background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow);padding:20px;margin-bottom:12px;border:1px solid var(--line)}
.hero.rest{background:var(--surface)}
.lbl{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
.hero h2{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:8px 0 5px}
.hero .meta{font-size:15px;color:var(--sub);font-weight:500}
.hero .meta b{color:var(--ink);font-weight:600}
.big-start{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;height:56px;margin-top:18px;
  background:var(--accent);color:var(--white);border-radius:var(--r-btn);font-size:18px;font-weight:700;box-shadow:0 6px 18px rgba(255,78,43,.28)}
.big-start:active{background:var(--accent-press);transform:translateY(1px)}
.big-start svg{width:20px;height:20px}
.big-start.ghost{background:var(--surface-2);color:var(--ink);box-shadow:none}
.big-start.ghost:active{background:var(--line)}
.done-pill{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;margin-top:18px;
  background:var(--good-tint);color:var(--good);border-radius:var(--r-btn);font-size:16px;font-weight:700}
.done-pill svg{width:18px;height:18px}

/* ---- week dots ---- */
.dots-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:16px 14px;margin-bottom:12px}
.dots{display:flex;justify-content:space-between}
.dot{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1}
.dot .dw{font-size:11px;font-weight:700;color:var(--faint);letter-spacing:.02em}
.dot .di{width:30px;height:30px;border-radius:50%;background:var(--surface-2);color:var(--faint);display:flex;align-items:center;justify-content:center}
.dot .di svg{width:15px;height:15px}
.dot.done .di{background:var(--accent);color:var(--white)}
.dot.today .di{background:var(--surface);border:2px solid var(--accent);color:var(--accent)}
.dot.today.done .di{background:var(--accent);border-color:var(--accent);color:var(--white)}
.dot.today .dw{color:var(--accent)}
.dot.rest .di{background:transparent;border:1px dashed var(--line-2)}

/* ---- generic card + anchor ---- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px}
.card h3{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;justify-content:space-between}
.card h3 .t{font-size:12px;font-weight:600;color:var(--sub);text-transform:none;letter-spacing:0}
.arow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.arow:last-child{border-bottom:0;padding-bottom:2px}
.arow .an{flex:1;font-size:15px;font-weight:500;color:var(--ink)}
.arow .ad{font-size:12px;font-weight:600;color:var(--sub);font-variant-numeric:tabular-nums}
.arow.checked .an{color:var(--faint)}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--line-2);flex:none;display:flex;align-items:center;justify-content:center;transition:.15s}
.chk svg{width:13px;height:13px;opacity:0;transition:.15s}
.checked .chk,.set.on .chk{background:var(--accent);border-color:var(--accent);color:var(--white)}
.checked .chk svg,.set.on .chk svg{opacity:1}
.anote{font-size:13px;line-height:1.5;color:var(--sub);margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.anote b{color:var(--accent);font-weight:700}

/* ---- workout player ---- */
.player-top{position:sticky;top:0;z-index:20;background:var(--bg);display:flex;align-items:center;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top)) 2px 12px;margin:0 -16px 2px;padding-left:16px;padding-right:16px}
.player-top .back{display:flex;align-items:center;gap:4px;font-size:15px;font-weight:600;color:var(--sub)}
.player-top .back svg{width:18px;height:18px}
.player-top .elapsed{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.player-top .fin{font-size:15px;font-weight:700;color:var(--accent)}
.warmcard{background:var(--surface-2);border-radius:var(--r-card);padding:13px 15px;margin-bottom:12px;font-size:13.5px;line-height:1.5;color:var(--sub)}
.warmcard b{color:var(--ink);font-weight:600}
.ex{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:15px 16px 8px;margin-bottom:12px}
.ex .exhead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.ex .exname{font-size:18px;font-weight:700;letter-spacing:-.01em}
.ex .exsub{font-size:12.5px;color:var(--sub);font-weight:500;margin-top:1px}
.ex .form{font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap;padding:4px 6px}
.colhead{display:grid;grid-template-columns:34px 1fr 1fr 44px;gap:8px;align-items:center;padding:8px 2px 4px}
.colhead span{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);text-align:center}
.colhead span:first-child{text-align:center}
.set{display:grid;grid-template-columns:34px 1fr 1fr 44px;gap:8px;align-items:center;padding:6px 0;border-top:1px solid var(--line)}
.set .sn{width:28px;height:28px;border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--sub);margin:0 auto}
.set.on .sn{background:var(--accent-tint);color:var(--accent)}
.field{height:40px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;gap:3px}
.field input{width:46px;text-align:right;font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.field .u{font-size:12px;font-weight:600;color:var(--faint)}
.set.on .field{background:var(--good-tint)}
.set .tick{width:40px;height:40px;border-radius:10px;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;margin-left:auto}
.set .tick svg{width:16px;height:16px;opacity:0}
.set.on .tick{background:var(--accent);border-color:var(--accent);color:var(--white)}
.set.on .tick svg{opacity:1}
.addset{width:100%;padding:11px;margin:4px 0 8px;border:1px dashed var(--line-2);border-radius:10px;font-size:13px;font-weight:600;color:var(--sub)}
.addset:active{background:var(--surface-2)}

/* ---- rest bar ---- */
.restbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--ink);color:var(--white);
  padding:14px 18px calc(14px + env(safe-area-inset-bottom));display:none;align-items:center;gap:14px;
  box-shadow:0 -6px 24px rgba(0,0,0,.18)}
.restbar.on{display:flex}
.restbar .rt{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;min-width:64px}
.restbar .rlab{font-size:11px;font-weight:600;opacity:.72;text-transform:uppercase;letter-spacing:.05em}
.restbar .bar{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.18);overflow:hidden}
.restbar .bar i{display:block;height:100%;background:var(--accent);width:100%;transition:width 1s linear}
.restbar .rb{font-size:13px;font-weight:700;padding:8px 12px;border-radius:9px;background:rgba(255,255,255,.14)}
.restbar .rb:active{background:rgba(255,255,255,.26)}
.restbar .skip{color:var(--accent);background:none;padding:8px 6px}

/* ---- run view ---- */
.runhero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:22px 20px;text-align:center;margin-bottom:12px}
.runhero .rd{font-size:56px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
.runhero .rd small{font-size:20px;font-weight:700;color:var(--sub);letter-spacing:0}
.runhero .pace{display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:var(--accent-tint);color:var(--accent);
  border-radius:999px;padding:9px 16px;font-size:14px;font-weight:700}
.runstruct{display:flex;flex-direction:column;gap:0}
.runstruct .rs{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);font-size:15px}
.runstruct .rs:last-child{border-bottom:0}
.runstruct .rs .n{width:24px;height:24px;border-radius:7px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--sub);display:flex;align-items:center;justify-content:center}
.runstruct .rs b{font-weight:600}

/* ---- sheet ---- */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(16,17,22,.42);display:none;align-items:flex-end;justify-content:center}
.scrim.on{display:flex;animation:fade .18s ease}
.sheet{width:100%;max-width:520px;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:var(--shadow-lg);animation:up .26s cubic-bezier(.4,0,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.grab{width:38px;height:5px;border-radius:3px;background:var(--line-2);margin:8px auto 14px}
.sheet h3{font-size:20px;font-weight:800;letter-spacing:-.01em;text-align:center;margin-bottom:4px}
.sheet .ssub{text-align:center;color:var(--sub);font-size:14px;margin-bottom:18px}
.logrow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.logrow label{font-size:15px;font-weight:600}
.logrow .inp{background:var(--surface-2);border-radius:10px;height:44px;display:flex;align-items:center;padding:0 14px;gap:4px}
.logrow .inp input{width:70px;text-align:right;font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.logrow .inp .u{font-size:13px;color:var(--faint);font-weight:600}
.paceout{text-align:center;padding:16px 0 6px;font-size:14px;color:var(--sub)}
.paceout b{font-size:26px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;display:block;letter-spacing:-.02em}
.rpe{display:flex;gap:8px;margin:14px 0 4px}
.rpe button{flex:1;height:44px;border-radius:11px;background:var(--surface-2);font-size:14px;font-weight:700;color:var(--sub)}
.rpe button.sel{background:var(--accent-tint);color:var(--accent)}
.sheet-cta{width:100%;height:54px;margin-top:18px;background:var(--accent);color:var(--white);border-radius:var(--r-btn);font-size:17px;font-weight:700}
.sheet-cta:active{background:var(--accent-press)}
/* completion */
.celebrate{text-align:center;padding:6px 0 0}
.celebrate .ring{width:78px;height:78px;border-radius:50%;background:var(--good-tint);display:flex;align-items:center;justify-content:center;margin:4px auto 14px}
.celebrate .ring svg{width:38px;height:38px;color:var(--good)}
.sumgrid{display:flex;justify-content:center;gap:26px;margin:16px 0 4px}
.sumgrid .sg{text-align:center}
.sumgrid .sg b{display:block;font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.sumgrid .sg span{font-size:12px;color:var(--sub);font-weight:600}

/* ---- week + ring view ---- */
.ringcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:20px}
.ringwrap{position:relative;width:104px;height:104px;flex:none}
.ringwrap svg{transform:rotate(-90deg)}
.ringwrap .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringwrap .ctr b{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.ringwrap .ctr span{font-size:11px;font-weight:600;color:var(--sub);margin-top:2px}
.ringcard .rmeta .rt{font-size:17px;font-weight:700}
.ringcard .rmeta .rd{font-size:13.5px;color:var(--sub);margin-top:3px;line-height:1.5}
.ringcard .rmeta .mi{margin-top:10px}
.mibar{height:7px;border-radius:4px;background:var(--surface-2);overflow:hidden;margin-top:5px}
.mibar i{display:block;height:100%;background:var(--accent)}
.weeklist .wl{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
.weeklist .wl:last-child{border-bottom:0}
.weeklist .wl .wd{width:40px;font-size:13px;font-weight:700;color:var(--sub)}
.weeklist .wl.today .wd{color:var(--accent)}
.weeklist .wl .ic{width:32px;height:32px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center}
.weeklist .wl .ic svg{width:16px;height:16px;color:var(--sub)}
.weeklist .wl.done .ic{background:var(--accent-tint)}
.weeklist .wl.done .ic svg{color:var(--accent)}
.weeklist .wl .wn{flex:1;font-size:15px;font-weight:600}
.weeklist .wl .wt{font-size:12.5px;color:var(--sub);font-weight:600}

/* weigh-in mini */
.weighrow{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.weighrow .wbtn{background:var(--surface-2);border-radius:10px;height:40px;padding:0 16px;font-size:14px;font-weight:700;color:var(--ink)}
.weighrow .wcur{font-size:14px;color:var(--sub);font-weight:600}
.weighrow .wcur b{color:var(--ink);font-weight:800;font-size:18px}

/* ---- library ---- */
.lib a{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 15px;margin-bottom:10px;color:inherit;text-decoration:none}
.lib a:active{background:var(--surface-2)}
.lib .li{width:40px;height:40px;border-radius:11px;background:var(--accent-tint);display:flex;align-items:center;justify-content:center;flex:none}
.lib .li svg{width:19px;height:19px;color:var(--accent)}
.lib .ln{font-size:15px;font-weight:700}
.lib .lc{font-size:12.5px;color:var(--sub);font-weight:500;margin-top:1px}
.lib .lar{margin-left:auto;color:var(--faint)}
.lib .lar svg{width:18px;height:18px}
.sectlbl{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:6px 2px 10px}

/* ---- bottom nav ---- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(247,248,250,.92);backdrop-filter:saturate(180%) blur(14px);
  border-top:1px solid var(--line);display:flex;justify-content:center;gap:8px;padding:8px 12px calc(8px + env(safe-area-inset-bottom))}
.nav.hide{display:none}
.nav button{flex:1;max-width:150px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--faint)}
.nav button svg{width:23px;height:23px}
.nav button span{font-size:10.5px;font-weight:700;letter-spacing:.01em}
.nav button.on{color:var(--accent)}

.foot{text-align:center;font-size:11.5px;color:var(--faint);padding:18px 0 6px;line-height:1.6}
</style>
</head>
<body>
<div class="app">

  <!-- ============ TODAY ============ -->
  <section class="view on" id="v-today">
    <div class="head">
      <div>
        <div class="date" id="td-date">Today</div>
        <div class="title">Today</div>
      </div>
      <div class="streak">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3c1 3 4 4 4 8a4 4 0 1 1-8 0c0-1 .5-2 1-2.5C9 10 9 12 9 12S8 8 12 3Z" fill="#FF4E2B"/></svg>
        <b class="num" id="td-streak">0</b><span>day streak</span>
      </div>
    </div>
    <div id="td-hero"></div>
    <div class="dots-card"><div class="dots" id="td-dots"></div></div>
    <div id="td-anchor"></div>
    <div class="foot">Your data lives only in this browser. Add to Home Screen to open it like an app.</div>
  </section>

  <!-- ============ WORKOUT PLAYER ============ -->
  <section class="view" id="v-workout">
    <div class="player-top">
      <button class="back" onclick="closeWorkout()"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Today</button>
      <div class="elapsed num" id="wo-elapsed">0:00</div>
      <button class="fin" onclick="finishWorkout()">Finish</button>
    </div>
    <div id="wo-body"></div>
  </section>

  <!-- ============ RUN ============ -->
  <section class="view" id="v-run">
    <div class="player-top">
      <button class="back" onclick="show('today')"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Today</button>
      <div class="elapsed" style="color:var(--sub);font-weight:600">Run</div>
      <div style="width:44px"></div>
    </div>
    <div id="run-body"></div>
  </section>

  <!-- ============ WEEK ============ -->
  <section class="view" id="v-week">
    <div class="head"><div><div class="date">This week</div><div class="title">Week</div></div></div>
    <div id="wk-body"></div>
  </section>

  <!-- ============ LIBRARY ============ -->
  <section class="view" id="v-library">
    <div class="head"><div><div class="date">Form &amp; follow-alongs</div><div class="title">Library</div></div></div>
    <div id="lib-body"></div>
  </section>

</div>

<!-- rest timer -->
<div class="restbar" id="restbar">
  <div><div class="rt num" id="rest-t">1:30</div><div class="rlab">Rest</div></div>
  <div class="bar"><i id="rest-fill"></i></div>
  <button class="rb" onclick="bumpRest(-15)">-15s</button>
  <button class="rb" onclick="bumpRest(15)">+15s</button>
  <button class="rb skip" onclick="endRest()">Skip</button>
</div>

<!-- sheet -->
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>

<!-- bottom nav -->
<nav class="nav" id="nav">
  <button data-nav="today" class="on" onclick="show('today')"><svg viewBox="0 0 24 24" fill="none"><path d="M4 11.5 12 5l8 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10v9h12v-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Today</span></button>
  <button data-nav="week" onclick="show('week')"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="2.5" stroke="currentColor" stroke-width="2"/><path d="M4 9h16M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Week</span></button>
  <button data-nav="library" onclick="show('library')"><svg viewBox="0 0 24 24" fill="none"><path d="M5 5h9a2 2 0 0 1 2 2v12l-5-3-5 3V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M16 7h3v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Library</span></button>
</nav>

<script>
"use strict";
/* ---------- icons ---------- */
var I={
  play:'<svg viewBox="0 0 24 24" fill="none"><path d="M7 5l12 7-12 7V5Z" fill="#fff"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.2 4.2L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  dumbbell:'<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 6.5v11M4 9v5M17.5 6.5v11M20 9v5M6.5 12h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  run:'<svg viewBox="0 0 24 24" fill="none"><circle cx="14" cy="5" r="2" fill="currentColor"/><path d="M13 9l-3 3 3 2 1 5M13 9l4 2M10 12l-4 1M11 16l-3 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  rest:'<svg viewBox="0 0 24 24" fill="none"><path d="M17 5a7 7 0 1 0 2 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none"><path d="M12 4v16M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
};

/* ---------- plan data ---------- */
var EX={
  goblet:{name:"Goblet squat",sets:3,reps:10,w:15,cue:"chest tall, knees track toes"},
  rdl:{name:"DB Romanian deadlift",sets:3,reps:10,w:15,cue:"chin tucked, hinge from hips"},
  floor:{name:"DB floor press",sets:3,reps:12,w:15,cue:"shoulders packed, elbows ~45"},
  row:{name:"1-arm DB row",sets:3,reps:10,w:15,cue:"flat back, pull to hip / side"}
};
var LIFT={
  title:"Full-Body Short",
  warm:"leg swings x10/side, arm circles x10, dead bug x8/side",
  cool:"chin tucks x10, doorway chest stretch 30s/side, dead hang 20s",
  order:["goblet","rdl","floor","row"]
};
var ANCHOR=[
  {n:"Cat-cow",d:"x8 slow"},
  {n:"Push-ups (sub-max)",d:"x8 clean"},
  {n:"Bodyweight squats",d:"x10"},
  {n:"Hip-flexor stretch",d:"30s/side"}
];
// dow: 0 Sun..6 Sat
var WEEK={
  1:{type:"lift"},
  2:{type:"run",dist:2,label:"Easy"},
  3:{type:"lift"},
  4:{type:"rest"},
  5:{type:"lift"},
  6:{type:"run",dist:3,label:"Easy, longer"},
  0:{type:"rest",weigh:true}
};
var PACE="9:50-11:00 /mi";

/* ---------- state ---------- */
var LS="train_v1";
var S=load();
function load(){try{return JSON.parse(localStorage.getItem(LS))||seed()}catch(e){return seed()}}
function seed(){return {weights:{},sets:{},done:{},runs:{},anchor:{},weigh:[]}}
function save(){try{localStorage.setItem(LS,JSON.stringify(S))}catch(e){}}

/* ---------- dates ---------- */
function keyOf(d){var y=d.getFullYear(),m=("0"+(d.getMonth()+1)).slice(-2),da=("0"+d.getDate()).slice(-2);return y+"-"+m+"-"+da;}
var NOW=new Date();
var TODAY=keyOf(NOW);
var DOW=NOW.getDay();
function fmtDate(d){return d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});}
var DWL=["S","M","T","W","T","F","S"];

/* ---------- helpers ---------- */
function wOf(id){return (S.weights[id]!=null)?S.weights[id]:EX[id].w;}
function isDayDone(k){return !!S.done[k];}
function mmss(sec){var m=Math.floor(sec/60),s=sec%60;return m+":"+("0"+s).slice(-2);}
function computeStreak(){
  var s=0,d=new Date(NOW);
  // if today not done, start counting from yesterday
  if(!isDayDone(keyOf(d))) d.setDate(d.getDate()-1);
  for(var i=0;i<400;i++){if(isDayDone(keyOf(d))){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}

/* ---------- router ---------- */
function show(v){
  document.querySelectorAll(".view").forEach(function(s){s.classList.remove("on")});
  document.getElementById("v-"+v).classList.add("on");
  var nav=document.getElementById("nav");
  var full=(v==="workout"||v==="run");
  nav.classList.toggle("hide",full);
  document.querySelectorAll(".nav button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-nav")===v)});
  if(v==="today")renderToday();
  if(v==="week")renderWeek();
  if(v==="library")renderLibrary();
  window.scrollTo(0,0);
}

/* ---------- TODAY ---------- */
function renderToday(){
  document.getElementById("td-date").textContent=fmtDate(NOW);
  document.getElementById("td-streak").textContent=computeStreak();
  var plan=WEEK[DOW], hero=document.getElementById("td-hero"), done=isDayDone(TODAY);
  var h="";
  if(plan.type==="lift"){
    h='<div class="hero"><div class="lbl">Today\'s session</div><h2>'+LIFT.title+'</h2>'+
      '<div class="meta"><b>4 exercises</b> &middot; ~30 min &middot; cut pace</div>'+
      (done?'<div class="done-pill">'+I.check+' Session complete</div>'
           :'<button class="big-start" onclick="startWorkout()">'+I.play+' Start workout</button>')+'</div>';
  }else if(plan.type==="run"){
    h='<div class="hero"><div class="lbl">Today\'s run</div><h2>'+plan.label+' run &middot; '+plan.dist+' mi</h2>'+
      '<div class="meta">Conversational pace &middot; <b>'+PACE+'</b></div>'+
      (done?'<div class="done-pill">'+I.check+' Run logged</div>'
           :'<button class="big-start" onclick="show(\'run\');renderRun();">'+I.play+' Start run</button>')+'</div>';
  }else{
    h='<div class="hero rest"><div class="lbl">Rest day</div><h2>Recover &amp; reset</h2>'+
      '<div class="meta">Just the morning anchor today'+(plan.weigh?' &middot; <b>Sunday weigh-in</b>':'')+'.</div>'+
      (plan.weigh?'<div class="weighrow"><span class="wcur">'+(S.weigh.length?('Last: <b>'+S.weigh[S.weigh.length-1].w+' lb</b>'):'No weigh-in yet')+'</span><button class="wbtn" onclick="weighSheet()">Log weight</button></div>':'')+'</div>';
  }
  hero.innerHTML=h;
  renderDots();
  renderAnchor();
}
function renderDots(){
  // Monday-start week containing today
  var mon=new Date(NOW); mon.setDate(NOW.getDate()-((DOW+6)%7));
  var out="";
  for(var i=0;i<7;i++){
    var d=new Date(mon); d.setDate(mon.getDate()+i);
    var k=keyOf(d), dw=d.getDay(), pl=WEEK[dw];
    var isT=(k===TODAY), dn=isDayDone(k);
    var ic= pl.type==="lift"?I.dumbbell : pl.type==="run"?I.run : I.rest;
    var cls="dot"+(dn?" done":"")+(isT?" today":"")+(pl.type==="rest"&&!dn?" rest":"");
    out+='<div class="'+cls+'"><span class="dw">'+DWL[dw]+'</span><div class="di">'+(dn?I.check:ic)+'</div></div>';
  }
  document.getElementById("td-dots").innerHTML=out;
}
function renderAnchor(){
  var a=S.anchor[TODAY]||{}, rows="";
  ANCHOR.forEach(function(m,i){
    var on=!!a[i];
    rows+='<div class="arow'+(on?" checked":"")+'" onclick="toggleAnchor('+i+')"><span class="an">'+m.n+'</span><span class="ad">'+m.d+'</span><span class="chk">'+I.check+'</span></div>';
  });
  var allc=ANCHOR.every(function(m,i){return a[i]});
  document.getElementById("td-anchor").innerHTML=
    '<div class="card"><h3>Morning anchor <span class="t">every day &middot; ~5 min</span></h3>'+rows+
    '<div class="anote">Never zero: a bad day is still <b>1 cat-cow + 1 push-up</b>. The rule is never miss twice.</div></div>';
  if(allc && WEEK[DOW].type==="rest"){ S.done[TODAY]=true; save(); }
}
function toggleAnchor(i){
  var a=S.anchor[TODAY]||{}; a[i]=!a[i]; if(!a[i])delete a[i]; S.anchor[TODAY]=a; save(); renderToday();
}

/* ---------- WORKOUT ---------- */
var woStart=null, woTimer=null;
function startWorkout(){ renderWorkout(); show("workout");
  woStart=Date.now();
  if(woTimer)clearInterval(woTimer);
  woTimer=setInterval(function(){document.getElementById("wo-elapsed").textContent=mmss(Math.floor((Date.now()-woStart)/1000));},1000);
}
function closeWorkout(){ if(woTimer)clearInterval(woTimer); endRest(); show("today"); }
function setKey(id,i){return TODAY+"|"+id+"|"+i;}
function renderWorkout(){
  var b=document.getElementById("wo-body"), h='<div class="warmcard"><b>Warm-up (3 min):</b> '+LIFT.warm+'</div>';
  LIFT.order.forEach(function(id){
    var e=EX[id], w=wOf(id), doneN=0;
    var setsHtml="";
    for(var i=0;i<e.sets;i++){ if(S.sets[setKey(id,i)])doneN++; }
    for(var i=0;i<e.sets;i++){
      var on=!!S.sets[setKey(id,i)];
      var reps=(on&&S.sets[setKey(id,i)].reps)?S.sets[setKey(id,i)].reps:e.reps;
      var wt=(on&&S.sets[setKey(id,i)].w)?S.sets[setKey(id,i)].w:w;
      setsHtml+='<div class="set'+(on?" on":"")+'" id="set-'+id+'-'+i+'">'+
        '<div class="sn">'+(i+1)+'</div>'+
        '<div class="field"><input inputmode="decimal" value="'+wt+'" onchange="editSet(\''+id+'\','+i+',\'w\',this.value)"><span class="u">lb</span></div>'+
        '<div class="field"><input inputmode="numeric" value="'+reps+'" onchange="editSet(\''+id+'\','+i+',\'reps\',this.value)"><span class="u">reps</span></div>'+
        '<button class="tick" onclick="toggleSet(\''+id+'\','+i+')">'+I.check+'</button></div>';
    }
    h+='<div class="ex"><div class="exhead"><div><div class="exname">'+e.name+'</div>'+
      '<div class="exsub">'+doneN+' of '+e.sets+' sets &middot; '+e.cue+'</div></div>'+
      '<a class="form" href="'+ytSearch(e.name+" form")+'" target="_blank" rel="noopener">Form</a></div>'+
      '<div class="colhead"><span>Set</span><span>Weight</span><span>Reps</span><span></span></div>'+
      setsHtml+
      '<button class="addset" onclick="addSet(\''+id+'\')">+ Add set</button></div>';
  });
  h+='<div class="warmcard"><b>Cooldown (2-3 min):</b> '+LIFT.cool+'</div>';
  b.innerHTML=h;
}
function editSet(id,i,f,v){
  var k=setKey(id,i), o=S.sets[k]||{}; o[f]=v.replace(/[^0-9.]/g,""); S.sets[k]=o;
  if(f==="w"){ S.weights[id]=o.w; } // remember adjusted target
  save();
}
function toggleSet(id,i){
  var k=setKey(id,i), row=document.getElementById("set-"+id+"-"+i);
  if(S.sets[k] && S.sets[k].on){ // uncheck
    delete S.sets[k].on; if(!S.sets[k].w&&!S.sets[k].reps)delete S.sets[k];
    row.classList.remove("on"); save(); refreshExHead(id); return;
  }
  var o=S.sets[k]||{}; o.on=true;
  if(o.w==null)o.w=wOf(id); if(o.reps==null)o.reps=EX[id].reps;
  S.sets[k]=o; save(); row.classList.add("on"); refreshExHead(id);
  startRest(90);
  if(navigator.vibrate)navigator.vibrate(12);
}
function refreshExHead(id){
  var e=EX[id],n=0; for(var i=0;i<e.sets;i++)if(S.sets[setKey(id,i)]&&S.sets[setKey(id,i)].on)n++;
  var head=document.querySelector("#v-workout .ex .exsub"); // update the specific one
  document.querySelectorAll("#wo-body .ex").forEach(function(card){
    var nm=card.querySelector(".exname"); if(nm&&nm.textContent===e.name){
      card.querySelector(".exsub").innerHTML=n+" of "+e.sets+" sets &middot; "+e.cue;
    }
  });
}
function addSet(id){ EX[id].sets++; renderWorkout(); }
function finishWorkout(){
  var total=0,setsN=0;
  LIFT.order.forEach(function(id){for(var i=0;i<EX[id].sets;i++){var s=S.sets[setKey(id,i)];if(s&&s.on){setsN++;total+=(parseFloat(s.w)||0)*(parseInt(s.reps)||0);}}});
  var dur=woStart?Math.floor((Date.now()-woStart)/1000):0;
  if(woTimer)clearInterval(woTimer); endRest();
  S.done[TODAY]=true; save();
  var body='<div class="grab"></div><div class="celebrate"><div class="ring">'+I.check+'</div>'+
    '<h3>Nice work</h3><div class="ssub">Full-Body Short logged</div>'+
    '<div class="sumgrid"><div class="sg"><b class="num">'+setsN+'</b><span>sets</span></div>'+
    '<div class="sg"><b class="num">'+Math.round(total).toLocaleString()+'</b><span>lb lifted</span></div>'+
    '<div class="sg"><b class="num">'+mmss(dur)+'</b><span>time</span></div></div>'+
    '<button class="sheet-cta" onclick="closeSheet();show(\'today\')">Done</button></div>';
  openSheet(body);
}

/* ---------- REST TIMER ---------- */
var restLeft=0,restTot=0,restInt=null;
function startRest(sec){restTot=sec;restLeft=sec;var rb=document.getElementById("restbar");rb.classList.add("on");drawRest();
  if(restInt)clearInterval(restInt);
  restInt=setInterval(function(){restLeft--;if(restLeft<=0){endRest();if(navigator.vibrate)navigator.vibrate([20,60,20]);return;}drawRest();},1000);}
function drawRest(){document.getElementById("rest-t").textContent=mmss(Math.max(restLeft,0));
  document.getElementById("rest-fill").style.width=(restTot?Math.max(restLeft,0)/restTot*100:0)+"%";}
function bumpRest(d){restLeft=Math.max(1,restLeft+d);restTot=Math.max(restTot,restLeft);drawRest();}
function endRest(){if(restInt)clearInterval(restInt);document.getElementById("restbar").classList.remove("on");}

/* ---------- RUN ---------- */
function renderRun(){
  var plan=WEEK[DOW]; if(plan.type!=="run")plan={dist:2,label:"Easy"};
  var logged=S.runs[TODAY];
  var b=document.getElementById("run-body");
  var h='<div class="runhero"><div class="lbl">Today\'s run</div>'+
    '<div class="rd num" style="margin-top:8px">'+plan.dist+'<small> mi</small></div>'+
    '<div class="pace">'+I.run+' '+plan.label+' &middot; '+PACE+'</div></div>'+
    '<div class="card"><h3>How to run it</h3><div class="runstruct">'+
      '<div class="rs"><span class="n">1</span><span>Warm up easy, <b>5 min</b> brisk walk or slow jog</span></div>'+
      '<div class="rs"><span class="n">2</span><span><b>'+plan.dist+' mi</b> at a pace you can hold a conversation</span></div>'+
      '<div class="rs"><span class="n">3</span><span>Can\'t talk in sentences? <b>Walk 30s</b>, restart</span></div>'+
      '<div class="rs"><span class="n">4</span><span>Cool down, <b>5 min</b> walk</span></div>'+
    '</div></div>';
  if(logged){
    h+='<div class="card"><h3>Logged today</h3><div class="weighrow" style="margin-top:8px"><span class="wcur"><b>'+logged.dist+' mi</b> in '+logged.time+' &middot; '+logged.pace+'/mi'+(logged.rpe?" &middot; "+logged.rpe:"")+'</span></div></div>';
  }else{
    h+='<button class="big-start" onclick="runSheet('+plan.dist+')">'+I.check+' Log run</button>';
  }
  b.innerHTML=h;
}

/* ---------- SHEETS ---------- */
function openSheet(html){document.getElementById("sheet").innerHTML=html;document.getElementById("scrim").classList.add("on");}
function closeSheet(){document.getElementById("scrim").classList.remove("on");}
document.getElementById("scrim").addEventListener("click",function(e){if(e.target===this)closeSheet();});
var rpeSel="";
function runSheet(dist){
  rpeSel="";
  var body='<div class="grab"></div><h3>Log run</h3><div class="ssub">Nice one. Punch in the numbers.</div>'+
    '<div class="logrow"><label>Distance</label><div class="inp"><input id="r-dist" inputmode="decimal" value="'+dist+'" oninput="calcPace()"><span class="u">mi</span></div></div>'+
    '<div class="logrow"><label>Time</label><div class="inp"><input id="r-time" inputmode="numeric" placeholder="mm:ss" oninput="calcPace()" style="width:88px"></div></div>'+
    '<div class="paceout">pace<b id="r-pace">--:--</b></div>'+
    '<div class="rpe"><button onclick="pickRpe(this,\'Easy\')">Easy</button><button onclick="pickRpe(this,\'OK\')">OK</button><button onclick="pickRpe(this,\'Hard\')">Hard</button></div>'+
    '<button class="sheet-cta" onclick="saveRun()">Save run</button>';
  openSheet(body);
}
function parseTime(t){t=(t||"").trim();if(!t)return null;if(t.indexOf(":")>=0){var p=t.split(":");return (parseInt(p[0])||0)*60+(parseInt(p[1])||0);}return (parseFloat(t)||0)*60;}
function calcPace(){
  var d=parseFloat((document.getElementById("r-dist")||{}).value),sec=parseTime((document.getElementById("r-time")||{}).value);
  var el=document.getElementById("r-pace");if(!el)return;
  if(d>0&&sec>0){var p=Math.round(sec/d);el.textContent=mmss(p);}else el.textContent="--:--";
}
function pickRpe(btn,v){rpeSel=v;document.querySelectorAll(".rpe button").forEach(function(b){b.classList.remove("sel")});btn.classList.add("sel");}
function saveRun(){
  var d=parseFloat((document.getElementById("r-dist")||{}).value),sec=parseTime((document.getElementById("r-time")||{}).value);
  if(!(d>0)){closeSheet();return;}
  var pace=sec>0?mmss(Math.round(sec/d)):"--:--", tstr=(document.getElementById("r-time")||{}).value||"--";
  S.runs[TODAY]={dist:d,time:tstr,pace:pace,rpe:rpeSel}; S.done[TODAY]=true; save();
  closeSheet(); renderRun();
}
function weighSheet(){
  var body='<div class="grab"></div><h3>Weigh-in</h3><div class="ssub">Sunday scale. One number.</div>'+
    '<div class="logrow"><label>Weight</label><div class="inp"><input id="w-val" inputmode="decimal" placeholder="0"><span class="u">lb</span></div></div>'+
    '<button class="sheet-cta" onclick="saveWeigh()">Save</button>';
  openSheet(body);
}
function saveWeigh(){var v=parseFloat((document.getElementById("w-val")||{}).value);if(v>0){S.weigh.push({date:TODAY,w:v});save();}closeSheet();renderToday();}

/* ---------- WEEK ---------- */
function renderWeek(){
  var lifts=WEEK, doneLifts=0,totLifts=0,miDone=0,totMi=0;
  var mon=new Date(NOW); mon.setDate(NOW.getDate()-((DOW+6)%7));
  var list="";
  for(var i=0;i<7;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);var k=keyOf(d),dw=d.getDay(),pl=WEEK[dw],dn=isDayDone(k),isT=(k===TODAY);
    if(pl.type==="lift"){totLifts++;if(dn)doneLifts++;}
    if(pl.type==="run"){totMi+=pl.dist;if(S.runs[k])miDone+=(parseFloat(S.runs[k].dist)||0);}
    var ic=pl.type==="lift"?I.dumbbell:pl.type==="run"?I.run:I.rest;
    var nm=pl.type==="lift"?"Full-Body Short":pl.type==="run"?(pl.label+" run"):"Rest";
    var tt=pl.type==="lift"?"~30 min":pl.type==="run"?(pl.dist+" mi"):(pl.weigh?"weigh-in":"anchor only");
    list+='<div class="wl'+(dn?" done":"")+(isT?" today":"")+'"><div class="wd">'+["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dw]+'</div>'+
      '<div class="ic">'+(dn?I.check:ic)+'</div><div class="wn">'+nm+'</div><div class="wt">'+tt+'</div></div>';
  }
  var pct=totLifts?doneLifts/totLifts:0, C=2*Math.PI*45, off=C*(1-pct);
  var ring='<div class="ringcard"><div class="ringwrap"><svg width="104" height="104" viewBox="0 0 104 104">'+
    '<circle cx="52" cy="52" r="45" fill="none" stroke="var(--surface-2)" stroke-width="10"/>'+
    '<circle cx="52" cy="52" r="45" fill="none" stroke="var(--accent)" stroke-width="10" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>'+
    '<div class="ctr"><b class="num">'+doneLifts+'/'+totLifts+'</b><span>workouts</span></div></div>'+
    '<div class="rmeta"><div class="rt">'+(doneLifts>=totLifts?"Week complete":"Keep going")+'</div>'+
    '<div class="rd">'+doneLifts+' of '+totLifts+' lifts done &middot; '+computeStreak()+'-day streak.</div>'+
    '<div class="mi"><div class="rd" style="margin:0">Running &middot; '+miDone.toFixed(1)+' / '+totMi+' mi</div>'+
    '<div class="mibar"><i style="width:'+(totMi?Math.min(100,miDone/totMi*100):0)+'%"></i></div></div></div></div>';
  document.getElementById("wk-body").innerHTML=ring+'<div class="card"><h3>The plan</h3><div class="weeklist">'+list+'</div></div>'+
    '<div class="foot">Consistency beats intensity. Three lifts and two easy runs a week is the whole game.</div>';
}

/* ---------- LIBRARY ---------- */
function ytSearch(q){return "https://www.youtube.com/results?search_query="+encodeURIComponent(q);}
function renderLibrary(){
  function item(icon,name,cap,q){return '<a href="'+ytSearch(q)+'" target="_blank" rel="noopener"><span class="li">'+icon+'</span><span><div class="ln">'+name+'</div><div class="lc">'+cap+'</div></span><span class="lar">'+I.arrow+'</span></a>';}
  var h='<div class="sectlbl">Lift form</div><div class="lib">'+
    item(I.dumbbell,"Goblet squat","clean form &amp; depth","goblet squat proper form")+
    item(I.dumbbell,"DB Romanian deadlift","hinge, protect the back","dumbbell romanian deadlift form")+
    item(I.dumbbell,"DB floor press","shoulder-safe pressing","dumbbell floor press form")+
    item(I.dumbbell,"1-arm DB row","flat back, full pull","one arm dumbbell row form")+
  '</div><div class="sectlbl">Mobility &amp; anchor</div><div class="lib">'+
    item(I.rest,"Morning mobility","10-min follow-along","10 minute morning mobility routine")+
