<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; form-action 'none'; base-uri 'none'">
<meta name="robots" content="noindex,nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Train">
<meta name="theme-color" content="#F7F8FA" id="theme-color">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Train</title>
<style>
:root{
  --bg:#F5F6F8; --surface:#FFFFFF; --surface-2:#EEF0F3; --raise:#FFFFFF;
  --ink:#0E1116; --sub:#616875; --faint:#767C86; --white:#FFFFFF;
  --line:#E7E9ED; --line-2:#D8DCE2;
  --accent:#FF4E2B; --accent-press:#E63E1E; --accent-tint:#FFE9E3;
  --good:#12A150; --good-tint:#E4F6EC; --amber:#B7791F; --amber-tint:#FBF1DD;
  --nav-bg:rgba(245,246,248,.86); --restbar-bg:#14181E; --restbar-ink:#FFFFFF; --scrim:rgba(16,17,22,.42);
  --shadow:0 1px 2px rgba(16,17,22,.04), 0 3px 12px rgba(16,17,22,.06);
  --shadow-lg:0 12px 44px rgba(16,17,22,.18);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  --r-card:16px; --r-btn:14px; --r-field:11px;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#0B0D11; --surface:#14181E; --surface-2:#1E242C; --raise:#191E25;
    --ink:#F3F5F8; --sub:#9BA3AF; --faint:#6B7079; --white:#FFFFFF;
    --line:#242A32; --line-2:#30363F;
    --accent:#FF5C3A; --accent-press:#FF7053; --accent-tint:#3A1E17;
    --good:#34D399; --good-tint:#12271E; --amber:#F0C36B; --amber-tint:#2A2213;
    --nav-bg:rgba(11,13,17,.86); --restbar-bg:#1E242C; --restbar-ink:#FFFFFF; --scrim:rgba(0,0,0,.6);
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.45);
    --shadow-lg:0 16px 52px rgba(0,0,0,.6);
  }
}
html[data-theme="dark"]{
  --bg:#0B0D11; --surface:#14181E; --surface-2:#1E242C; --raise:#191E25;
  --ink:#F3F5F8; --sub:#9BA3AF; --faint:#6B7079; --white:#FFFFFF;
  --line:#242A32; --line-2:#30363F;
  --accent:#FF5C3A; --accent-press:#FF7053; --accent-tint:#3A1E17;
  --good:#34D399; --good-tint:#12271E; --amber:#F0C36B; --amber-tint:#2A2213;
  --nav-bg:rgba(11,13,17,.86); --restbar-bg:#1E242C; --restbar-ink:#FFFFFF; --scrim:rgba(0,0,0,.6);
  --shadow:0 1px 2px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.45);
  --shadow-lg:0 16px 52px rgba(0,0,0,.6);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font:16px/1.45 var(--sans);-webkit-font-smoothing:antialiased;
  -webkit-user-select:none;user-select:none;overscroll-behavior-y:none;padding-top:env(safe-area-inset-top);min-height:100vh}
button,input,select{font-family:inherit;color:inherit;font-size:16px}
button{touch-action:manipulation;border:0;background:none;cursor:pointer}
input,select{border:0;background:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
.num{font-variant-numeric:tabular-nums}
.app{max-width:540px;margin:0 auto;padding:0 16px calc(92px + env(safe-area-inset-bottom));position:relative}
.view{display:none}
.view.on{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* header */
.head{display:flex;align-items:center;justify-content:space-between;padding:16px 2px 12px;gap:10px}
.head .date{font-size:13.5px;font-weight:600;color:var(--sub)}
.head .title{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-top:1px}
.head .tools{display:flex;align-items:center;gap:8px}
.iconbtn{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;color:var(--sub)}
.iconbtn:active{background:var(--surface-2)}
.iconbtn svg{width:19px;height:19px}
.streak{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 13px 8px 11px;box-shadow:var(--shadow)}
.streak svg{width:16px;height:16px;color:var(--accent)}
.streak.zero svg{color:var(--faint)}
.streak b{font-size:15px;font-weight:800}.streak span{font-size:12px;font-weight:600;color:var(--sub)}

/* hero */
.hero{background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow);padding:20px;margin-bottom:12px;border:1px solid var(--line);position:relative}
.hero .chg{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--sub)}
.hero .chg svg{width:17px;height:17px}
.lbl{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.hero h2{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:8px 0 5px;padding-right:34px}
.hero .meta{font-size:14.5px;color:var(--sub);font-weight:500}.hero .meta b{color:var(--ink);font-weight:600}
.big-start{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;height:56px;margin-top:18px;background:var(--accent);color:var(--white);border-radius:var(--r-btn);font-size:18px;font-weight:700;box-shadow:0 6px 18px rgba(255,78,43,.26)}
.big-start:active{background:var(--accent-press);transform:translateY(1px)}
.big-start svg{width:20px;height:20px}
.big-start.ghost{background:var(--surface-2);color:var(--ink);box-shadow:none}
.done-pill{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;margin-top:18px;background:var(--good-tint);color:var(--good);border-radius:var(--r-btn);font-size:16px;font-weight:700}
.done-pill svg{width:18px;height:18px}

/* progress ring inline (anchor) */
.miniring{width:34px;height:34px;flex:none}
.miniring svg{transform:rotate(-90deg)}

/* week dots */
.dots-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:15px 12px;margin-bottom:12px}
.dots{display:flex;justify-content:space-between}
.dot{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1}
.dot .dw{font-size:11px;font-weight:700;color:var(--faint)}
.dot .di{width:30px;height:30px;border-radius:50%;background:var(--surface-2);color:var(--faint);display:flex;align-items:center;justify-content:center}
.dot .di svg{width:15px;height:15px}
.dot.done .di{background:var(--accent);color:var(--white)}
.dot.today .di{background:var(--surface);border:2px solid var(--accent);color:var(--accent)}
.dot.today.done .di{background:var(--accent);border-color:var(--accent);color:var(--white)}
.dot.today .dw{color:var(--accent)}
.dot.rest .di{background:transparent;border:1px dashed var(--line-2)}

/* generic card */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px}
.card h3,.trend h3{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card h3 .t,.trend h3 .t{font-size:12px;font-weight:600;color:var(--sub);text-transform:none;letter-spacing:0}
.card h3 .t b{color:var(--accent);font-weight:800}
.arow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);width:100%;text-align:left;background:none}
.arow:last-child{border-bottom:0;padding-bottom:2px}
.arow:active{background:var(--surface-2)}
.arow .an{flex:1;font-size:15px;font-weight:500;color:var(--ink)}
.arow .ad{font-size:12px;font-weight:600;color:var(--sub);font-variant-numeric:tabular-nums}
.arow.checked .an{color:var(--faint)}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--line-2);flex:none;display:flex;align-items:center;justify-content:center;transition:.15s}
.chk svg{width:13px;height:13px;opacity:0;transition:.15s}
.checked .chk{background:var(--accent);border-color:var(--accent);color:var(--white)}
.checked .chk svg{opacity:1}
.anote{font-size:13px;line-height:1.5;color:var(--sub);margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.anote b{color:var(--accent);font-weight:700}
.weighrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.weighrow .wcur{font-size:14px;color:var(--sub);font-weight:600}.weighrow .wcur b{color:var(--ink);font-weight:800;font-size:18px}
.wbtn{background:var(--surface-2);border-radius:10px;height:40px;padding:0 15px;font-size:14px;font-weight:700;color:var(--ink)}

/* workout player */
.ptop{position:sticky;top:0;z-index:20;background:var(--bg);display:flex;align-items:center;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top)) 16px 12px;margin:0 -16px 2px}
.ptop .back{display:flex;align-items:center;gap:3px;font-size:15px;font-weight:600;color:var(--sub)}
.ptop .back svg{width:19px;height:19px}
.ptop .mid{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.ptop .fin{font-size:15px;font-weight:700;color:var(--accent)}
.warmcard{background:var(--surface-2);border-radius:var(--r-card);padding:12px 15px;margin-bottom:12px;font-size:13px;line-height:1.5;color:var(--sub)}
.warmcard b{color:var(--ink);font-weight:600}
.ex{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:15px 15px 9px;margin-bottom:12px}
.ex .exhead{display:flex;align-items:flex-start;gap:10px;margin-bottom:3px}
.ex .exname{font-size:18px;font-weight:700;letter-spacing:-.01em;flex:1;min-width:0}
.ex .more{width:32px;height:32px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--sub);flex:none;margin-top:-2px}
.ex .more svg{width:18px;height:18px}
.aim{font-size:12.5px;color:var(--sub);font-weight:500;margin-bottom:6px}
.aim b{color:var(--accent);font-weight:700}
.colhead{display:grid;grid-template-columns:30px 1fr 1fr 42px;gap:8px;padding:6px 2px 2px}
.colhead span{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);text-align:center}
.set{display:grid;grid-template-columns:30px 1fr 1fr 42px;gap:8px;align-items:center;padding:5px 0;border-top:1px solid var(--line)}
.set:first-of-type{border-top:0}
.set .sn{width:26px;height:26px;border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--sub);margin:0 auto}
.set.on .sn{background:var(--accent-tint);color:var(--accent)}
.stp{display:flex;align-items:center;background:var(--surface-2);border-radius:10px;height:42px;overflow:hidden}
.set.on .stp{background:var(--accent-tint)}
.stp button{width:34px;height:42px;font-size:20px;font-weight:600;color:var(--sub);flex:none;display:flex;align-items:center;justify-content:center}
.stp button:active{background:rgba(0,0,0,.06)}
.stp .val{flex:1;text-align:center;font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;min-width:0;padding:0}
.stp .val:focus-visible{outline:none}
.stp .u{font-size:10px;color:var(--faint);font-weight:600;padding-right:8px}
.bwtag{height:42px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--sub)}
.tick{width:42px;height:42px;border-radius:10px;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;margin-left:auto}
.tick svg{width:17px;height:17px;opacity:0}
.set.on .tick{background:var(--accent);border-color:var(--accent);color:var(--white);animation:pop .25s ease}
.set.on .tick svg{opacity:1}
.set.on .val{color:var(--accent)}
.setbtns{display:flex;gap:8px;margin:6px 0 6px}
.setbtn{flex:1;padding:9px;border:1px dashed var(--line-2);border-radius:10px;font-size:12.5px;font-weight:600;color:var(--sub)}
.setbtn:active{background:var(--surface-2)}
.setbtn.rm{border-style:solid;color:var(--faint)}

/* rest bar */
.restbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--restbar-bg);color:var(--restbar-ink);
  padding:14px 16px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;
  box-shadow:0 -6px 24px rgba(0,0,0,.18);transform:translateY(120%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.restbar.on{transform:none}
.restbar .rt{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;min-width:60px}
.restbar .rlab{font-size:10.5px;font-weight:600;opacity:.7;text-transform:uppercase;letter-spacing:.05em}
.restbar .bar{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.18);overflow:hidden}
.restbar .bar i{display:block;height:100%;background:var(--accent);width:100%}
.restbar.warn .bar i{background:var(--good)}
.restbar .rb{font-size:13px;font-weight:700;padding:11px 12px;border-radius:9px;background:rgba(255,255,255,.14);min-width:44px}
.restbar .rb:active{background:rgba(255,255,255,.26)}
.restbar .skip{color:var(--accent);background:none;padding:11px 8px}

/* run */
.runhero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:22px 20px;text-align:center;margin-bottom:12px}
.runhero .rd{font-size:54px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
.runhero .rd small{font-size:19px;font-weight:700;color:var(--sub);letter-spacing:0}
.runhero .pace{display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:var(--accent-tint);color:var(--accent);border-radius:999px;padding:9px 15px;font-size:13.5px;font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
.runhero .pace svg{width:15px;height:15px;flex:none}
.runstruct .rs{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);font-size:14.5px}
.runstruct .rs:last-child{border-bottom:0}
.runstruct .rs .n{width:24px;height:24px;border-radius:7px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--sub);display:flex;align-items:center;justify-content:center;flex:none}
.runstruct .rs b{font-weight:600}

/* sheet */
.scrim{position:fixed;inset:0;z-index:50;background:var(--scrim);display:none;align-items:flex-end;justify-content:center}
.scrim.on{display:flex;animation:fade .18s ease}
.sheet{width:100%;max-width:540px;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:var(--shadow-lg);animation:up .26s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto}
.grab{width:38px;height:5px;border-radius:3px;background:var(--line-2);margin:8px auto 14px}
.sheet h3{font-size:20px;font-weight:800;letter-spacing:-.01em;text-align:center;margin-bottom:3px}
.sheet .ssub{text-align:center;color:var(--sub);font-size:13.5px;margin-bottom:16px}
.opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:14px 4px;border-bottom:1px solid var(--line);background:none}
.opt:last-of-type{border-bottom:0}
.opt:active{background:var(--surface-2)}
.opt .oi{width:36px;height:36px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--sub);flex:none}
.opt .oi svg{width:18px;height:18px}
.opt .on2{font-size:15px;font-weight:600}.opt .oc{font-size:12.5px;color:var(--sub)}
.opt.danger .on2{color:var(--accent)}
.opt .oar{margin-left:auto;color:var(--faint)}.opt .oar svg{width:18px;height:18px}
.logrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.logrow label{font-size:15px;font-weight:600}
.stp.sheetstp{max-width:170px;flex:1}
.inp{background:var(--surface-2);border-radius:10px;height:44px;display:flex;align-items:center;padding:0 14px;gap:4px}
.inp input{width:78px;text-align:right;font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}.inp .u{font-size:13px;color:var(--faint);font-weight:600}
.paceout{text-align:center;padding:14px 0 4px;font-size:13px;color:var(--sub)}
.paceout b{font-size:26px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;display:block;letter-spacing:-.02em}
.rpe{display:flex;gap:8px;margin:14px 0 4px}
.rpe button{flex:1;height:44px;border-radius:11px;background:var(--surface-2);font-size:14px;font-weight:700;color:var(--sub)}
.rpe button.sel{background:var(--accent-tint);color:var(--accent)}
.seg{display:flex;background:var(--surface-2);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;height:38px;border-radius:9px;font-size:13.5px;font-weight:700;color:var(--sub)}
.seg button.sel{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
.tin{width:100%;background:var(--surface-2);border-radius:10px;height:44px;padding:0 14px;font-size:15px;font-weight:600}
.ta{width:100%;background:var(--surface-2);border-radius:10px;padding:12px 14px;font-size:13px;font-weight:500;font-family:var(--sans);min-height:120px;resize:vertical;line-height:1.5}
.sheet-cta{width:100%;height:54px;margin-top:16px;background:var(--accent);color:var(--white);border-radius:var(--r-btn);font-size:17px;font-weight:700}
.sheet-cta:active{background:var(--accent-press)}
.sheet-cta.ghost{background:var(--surface-2);color:var(--ink);margin-top:8px}
.celebrate{text-align:center;padding:6px 0 0}
.celebrate .ring{width:76px;height:76px;border-radius:50%;background:var(--accent-tint);display:flex;align-items:center;justify-content:center;margin:4px auto 12px;animation:pop .4s ease}
.celebrate .ring svg{width:36px;height:36px;color:var(--accent)}
.sumgrid{display:flex;justify-content:center;gap:20px;margin:14px 0 4px}
.sumgrid .sg{text-align:center}.sumgrid .sg b{display:block;font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}.sumgrid .sg span{font-size:12px;color:var(--sub);font-weight:600}
.prbadge{display:flex;align-items:center;gap:8px;justify-content:center;background:var(--amber-tint);color:var(--amber);border-radius:11px;padding:10px;font-size:13.5px;font-weight:700;margin-top:12px}
.prbadge svg{width:17px;height:17px}

/* week / progress */
.ringcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:20px}
.ringcard.complete{border-color:var(--accent)}
.ringwrap{position:relative;width:100px;height:100px;flex:none}.ringwrap svg{transform:rotate(-90deg)}
.ringwrap .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringwrap .ctr b{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}.ringwrap .ctr span{font-size:11px;font-weight:600;color:var(--sub)}
.rmeta .rt{font-size:16px;font-weight:700}.rmeta .rd{font-size:13px;color:var(--sub);margin-top:3px;line-height:1.5}
.mibar{height:7px;border-radius:4px;background:var(--surface-2);overflow:hidden;margin-top:6px}.mibar i{display:block;height:100%;background:var(--accent)}
.weeklist .wl{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);width:100%;text-align:left;background:none}
.weeklist .wl:last-child{border-bottom:0}.weeklist .wl:active{background:var(--surface-2)}
.weeklist .wl.today{border-radius:10px;background:var(--accent-tint);padding-left:8px;padding-right:8px}
.weeklist .wl .wd{width:38px;font-size:13px;font-weight:700;color:var(--sub)}.weeklist .wl.today .wd{color:var(--accent)}
.weeklist .wl .ic{width:32px;height:32px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--sub)}
.weeklist .wl .ic svg{width:16px;height:16px}
.weeklist .wl.done .ic{background:var(--accent-tint);color:var(--accent)}
.weeklist .wl .wn{flex:1;font-size:14.5px;font-weight:600}.weeklist .wl .wt{font-size:12px;color:var(--sub);font-weight:600}
.stattiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 15px}
.stat .sl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.stat .sv{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums}.stat .sv small{font-size:13px;color:var(--sub);font-weight:700}
.stat .st{font-size:11.5px;font-weight:600;margin-top:2px;color:var(--good)}.stat .st.flat{color:var(--sub)}
.trend{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:16px 16px 10px;margin-bottom:12px}
.prlist .pr{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.prlist .pr:last-child{border-bottom:0}
.prlist .pr .pn{flex:1;font-size:14.5px;font-weight:600}.prlist .pr .pv{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}.prlist .pr .pd{font-size:11px;color:var(--faint);font-weight:600;width:64px;text-align:right}

/* library */
.sectlbl{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:14px 2px 9px}
.lib a,.lib .lg{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:9px;color:inherit;text-decoration:none}
.lib a:active{background:var(--surface-2)}
.lib .li{width:38px;height:38px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--sub);flex:none}
.lib .li.acc{background:var(--accent-tint);color:var(--accent)}
.lib .li svg{width:18px;height:18px}
.lib .ln{font-size:14.5px;font-weight:700}.lib .lc{font-size:12px;color:var(--sub);font-weight:500;margin-top:1px}
.lib .lar{margin-left:auto;color:var(--faint)}.lib .lar svg{width:17px;height:17px}
.lib .tag{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;background:var(--surface-2);border-radius:6px;padding:3px 6px;margin-left:auto}

/* settings */
.setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.setrow:last-child{border-bottom:0}
.setrow .sk{font-size:15px;font-weight:600}.setrow .skc{font-size:12px;color:var(--sub);margin-top:1px}

/* toast */
.toast{position:fixed;left:16px;right:16px;bottom:calc(96px + env(safe-area-inset-bottom));z-index:60;max-width:508px;margin:0 auto;
  background:var(--restbar-bg);color:var(--restbar-ink);border-radius:13px;padding:13px 16px;display:none;align-items:center;gap:12px;box-shadow:var(--shadow-lg);animation:up .24s ease}
.toast.on{display:flex}
.toast .tm{flex:1;font-size:14px;font-weight:600}
.toast .tu{color:var(--accent);font-weight:800;font-size:14px;padding:4px 6px}

/* nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--nav-bg);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
  border-top:1px solid var(--line);display:flex;justify-content:center;gap:2px;padding:7px 8px calc(7px + env(safe-area-inset-bottom))}
.nav.hide{display:none}
.nav button{flex:1;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;color:var(--faint)}
.nav button svg{width:22px;height:22px}.nav button span{font-size:10px;font-weight:700}
.nav button.on{color:var(--accent)}
.foot{text-align:center;font-size:11.5px;color:var(--faint);padding:16px 8px 6px;line-height:1.6}
</style>
</head>

      <button class="back" onclick="closeWorkout()" aria-label="Back to today"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Today</button>

  <button data-nav="progress" onclick="show('progress')"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 19V5M5 19h14M8 16l3-4 3 2 4-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Progress</span></button>

<script>

  copy:'<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="8" y="8" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M4 16V4h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  send:'<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 12l16-8-6 16-3-6-7-2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>',
  trophy:'<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 4h10v4a5 5 0 0 1-10 0V4ZM7 6H4v1a3 3 0 0 0 3 3M17 6h3v1a3 3 0 0 1-3 3M9 20h6M12 15v5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  bolt:'<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M13 3L5 13h5l-1 8 8-11h-5l1-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 4v16M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'
};

/* ============ exercise library ============ */
var LIB={

var PATTERNS={squat:"Squat",hinge:"Hinge","h-push":"Horizontal push","v-push":"Vertical push","h-pull":"Horizontal pull","v-pull":"Vertical pull",core:"Core",isolation:"Prehab / isolation"};

/* ============ plan (A/B/C rotating full-body) ============ */
function slot(exId,sets,low,high,w){var e=LIB[exId];return {exId:exId,sets:sets,low:low,high:high,weight:(e.bw?0:(w||15)),unit:e.unit||"reps",side:!!e.side,bw:!!e.bw};}
var DAYS={
  A:{name:"Squat + Press",slots:[slot("goblet",3,10,15,15),slot("rdl",3,8,12,15),slot("floorpress",3,8,12,15),slot("row1",3,8,12,15),slot("deadbug",2,8,10,0)]},
  B:{name:"Hinge + Pull",slots:[slot("rdl",3,8,12,15),slot("revlunge",3,8,12,15),slot("csrow",3,8,12,15),slot("inclinepress",3,8,12,15),slot("sideplank",2,30,40,0)]},
  C:{name:"Legs + Prehab",slots:[slot("bulgarian",3,8,12,15),slot("hipthrust",3,10,15,15),slot("pushup",3,8,15,0),slot("row1",3,8,12,15),slot("facepull",2,12,15,0)]}
};
var LETTERS=["A","B","C"];
var WARM="leg swings x10/side, arm circles x10, band pull-apart x15, dead bug x8/side";
var COOL="chin tucks x10, doorway chest stretch 30s/side, dead hang 20s";
var ANCHOR=[{n:"Cat-cow",d:"x8 slow"},{n:"Push-ups (sub-max)",d:"x8 clean"},{n:"Bodyweight squats",d:"x10"},{n:"Hip-flexor stretch",d:"30s/side"}];
var WEEK={1:{type:"lift"},2:{type:"run",dist:2,label:"Easy"},3:{type:"lift"},4:{type:"rest"},5:{type:"lift"},6:{type:"run",dist:3,label:"Easy, longer"},0:{type:"rest",weigh:true}};
var PACE_MI="9:50-11:00";

/* ============ state ============ */
var LS="train_v2";
var S=load();
function seed(){return {v:2,profile:{name:"",units:"lb",loc:"Miami",goalLb:180,stretchLb:175,rest:90,theme:"system",started:null,setup:false},
  progress:{},wk:{},sessions:[],done:{},runs:{},anchor:{},weigh:[],planPos:0,override:{}};}
function load(){
  var raw=null;try{raw=JSON.parse(localStorage.getItem(LS))}catch(e){}
  if(!raw){ // migrate from v1 if present
    try{var v1=JSON.parse(localStorage.getItem("train_v1"));if(v1){var s=seed();s.weigh=v1.weigh||[];s.anchor=v1.anchor||{};s.done=v1.done||{};s.runs=v1.runs||{};return s;}}catch(e){}
    return seed();
  }
  return Object.assign(seed(),raw);
}
var saveWarned=false;
function save(){try{localStorage.setItem(LS,JSON.stringify(S))}catch(e){if(!saveWarned){saveWarned=true;toast("Storage is full or blocked. Logs may not save.",null)}}}

/* ============ dates ============ */
function keyOf(d){return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);}
var NOW,TODAY,DOW;
function refreshDate(){NOW=new Date();TODAY=keyOf(NOW);DOW=NOW.getDay();}
refreshDate();
function fmtDate(d){return d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});}
var DWL=["Su","Mo","Tu","We","Th","Fr","Sa"];
var DFULL=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

/* ============ helpers ============ */
function U(){return S.profile.units;}
function inc(){return U()==="kg"?2.5:5;}
function mmss(s){s=Math.max(0,Math.round(s));var m=Math.floor(s/60);return m+":"+("0"+(s%60)).slice(-2);}
function todayPlan(){return S.override[TODAY]||WEEK[DOW];}
function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function isDone(k){return !!S.done[k];}
function letterFor(){return LETTERS[(S.planPos||0)%3];}

/* build (or fetch) today's working lift session */
function workDay(){
  if(S.wk[TODAY])return S.wk[TODAY];
  var L=letterFor(),tpl=DAYS[L];
  var order=tpl.slots.map(function(sl){
    var t=S.progress[sl.exId]||{};
    var w=(t.weight!=null?t.weight:sl.weight);
    var low=(t.low!=null?t.low:sl.low),high=(t.high!=null?t.high:sl.high);
    var sets=[];for(var i=0;i<sl.sets;i++)sets.push({w:w,reps:low,on:false});
    return {exId:sl.exId,unit:sl.unit,side:sl.side,bw:sl.bw,low:low,high:high,weight:w,sets:sets};
  });
  S.wk[TODAY]={letter:L,name:tpl.name,order:order,start:null};
  save();return S.wk[TODAY];
}
function wkProgress(){var w=S.wk[TODAY];if(!w)return {done:0,total:0};var d=0,t=0;w.order.forEach(function(o){o.sets.forEach(function(s){t++;if(s.on)d++;});});return {done:d,total:t};}

/* last-time / aim */
function lastEntry(exId){
  for(var i=S.sessions.length-1;i>=0;i--){var ss=S.sessions[i];if(ss.type!=="lift"||ss.id===TODAY)continue;
    for(var j=0;j<ss.entries.length;j++){if(ss.entries[j].exerciseId===exId){return {date:ss.id,e:ss.entries[j]};}}}
  return null;
}
function topSet(sets){var best=null;sets.forEach(function(s){if(!s.completed&&s.on===false)return;var r=s.reps||0,w=s.weightLb!=null?s.weightLb:(s.w||0);if(!best||(w>best.w)||(w===best.w&&r>best.r))best={w:w,r:r};});return best;}
function aimText(o){
  var le=lastEntry(o.exId);var unit=o.unit==="s"?"s":"";
  if(!le){return 'First time. Find your groove, leave 2 in the tank. Target <b>'+o.low+'-'+o.high+(unit?' s':' reps')+'</b>.';}
  var best=null;le.e.sets.forEach(function(s){if(s.completed){var w=s.weightLb||0,r=s.reps||0;if(!best||w>best.w||(w===best.w&&r>best.r))best={w:w,r:r};}});
  if(!best)best={w:o.weight,r:o.low};
  var aimR=Math.min(best.r+1,o.high);
  var loadTxt=o.bw?"":(best.w+wLbl()+" ");
  var aim=o.bw?("aim <b>"+aimR+(unit?"s":" reps")+"</b>"):(best.r>=o.high?("try <b>"+(S.profile.loc==="Boca"?(best.w+inc())+wLbl()+" x"+o.low:"+1 set or slower tempo")+"</b>"):("aim <b>"+loadTxt+"x"+aimR+"</b>"));
  return 'Last '+shortDate(le.date)+': <b>'+best.r+(unit?"s":"")+(o.bw?"":" @ "+best.w+wLbl())+'</b> &middot; '+aim;
}
function wLbl(){return U()==="kg"?"kg":"lb";}
function shortDate(k){var p=k.split("-");return DFULL[new Date(+p[0],+p[1]-1,+p[2]).getDay()]+" "+(+p[2]);}

/* PR / e1rm */
function e1rm(w,r){return w*(1+r/30);}
function prFor(exId){var best=null;S.sessions.forEach(function(ss){if(ss.type!=="lift")return;ss.entries.forEach(function(e){if(e.exerciseId!==exId)return;e.sets.forEach(function(s){if(!s.completed)return;var v=e1rm(s.weightLb||0,s.reps||0);if(!best||v>best.e)best={w:s.weightLb||0,r:s.reps||0,e:v,date:ss.id};});});});return best;}

/* streak / stats */
function computeStreak(){refreshDate();var s=0,d=new Date(NOW);if(!isDone(keyOf(d)))d.setDate(d.getDate()-1);for(var i=0;i<500;i++){if(isDone(keyOf(d))){s++;d.setDate(d.getDate()-1);}else break;}return s;}
function ewma(){if(!S.weigh.length)return null;var a=0.12,e=S.weigh[0].w;for(var i=1;i<S.weigh.length;i++)e=a*S.weigh[i].w+(1-a)*e;return e;}
function isoWeek(k){var p=k.split("-");var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));var day=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-day+3);var f=new Date(Date.UTC(d.getUTCFullYear(),0,4));var w=1+Math.round(((d-f)/86400000-3+((f.getUTCDay()+6)%7))/7);return d.getUTCFullYear()+"-W"+("0"+w).slice(-2);}

/* ============ router ============ */
function show(v){
  refreshDate();
  document.querySelectorAll(".view").forEach(function(s){s.classList.remove("on")});
  document.getElementById("v-"+v).classList.add("on");
  var full=(v==="workout"||v==="run");
  document.getElementById("nav").classList.toggle("hide",full);
  document.querySelectorAll(".nav button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-nav")===v)});
  if(v==="today")renderToday();
  if(v==="week")renderWeek();
  if(v==="progress")renderProgress();
  if(v==="library")renderLibrary();
  window.scrollTo(0,0);
}

    var ic=pl.type==="lift"?I.dumbbell:pl.type==="run"?I.run:I.rest;

function toggleAnchor(i){var a=S.anchor[TODAY]||{};a[i]=!a[i];if(!a[i])delete a[i];S.anchor[TODAY]=a;
  var allc=ANCHOR.every(function(m,idx){return a[idx]});

function optRow(ic,title,cap,fn,danger){return '<button class="opt'+(danger?" danger":"")+'" onclick="'+fn+'"><span class="oi">'+ic+'</span><span><div class="on2">'+title+'</div>'+(cap?'<div class="oc">'+cap+'</div>':'')+'</span><span class="oar">'+I.arrow+'</span></button>';}
function setToday(w){
  if(w==="clear")delete S.override[TODAY];
  else if(w==="lift")S.override[TODAY]={type:"lift"};
  else if(w==="run2")S.override[TODAY]={type:"run",dist:2,label:"Easy"};

  save();closeSheet();
  if(w==="min"){openSheet('<div class="grab"></div><h3>5-minute minimum</h3><div class="ssub">Do any two. Then you kept the streak.</div>'+
    '<div class="card" style="box-shadow:none;border:0;padding:0">'+

    '<button class="sheet-cta" onclick="S.done[TODAY]=true;save();closeSheet();renderToday();">Done &mdash; keep my streak</button>');return;}
  renderToday();
}

/* ============ WORKOUT ============ */
var woTimer=null;
function startWorkout(){var w=workDay();if(!w.start){w.start=Date.now();save();}renderWorkout();show("workout");
  if(woTimer)clearInterval(woTimer);
  function tick(){var el=w.start?Math.floor((Date.now()-w.start)/1000):0;var e=document.getElementById("wo-elapsed");if(e)e.textContent=mmss(el);}
  tick();woTimer=setInterval(tick,1000);}
function closeWorkout(){if(woTimer){clearInterval(woTimer);woTimer=null;}endRest();show("today");}
function renderWorkout(){
  var w=S.wk[TODAY];if(!w){show("today");return;}
  var h='<div class="warmcard"><b>Warm-up (3 min):</b> '+WARM+'</div>';
  w.order.forEach(function(o,oi){
    var e=LIB[o.exId],doneN=0;o.sets.forEach(function(s){if(s.on)doneN++;});
    var setsHtml="";
    o.sets.forEach(function(s,si){
      var wcell=o.bw?'<div class="bwtag">BW</div>':
        '<div class="stp"><button onclick="step('+oi+','+si+',\'w\',-1)" aria-label="less weight">&minus;</button><input class="val num" inputmode="decimal" value="'+s.w+'" aria-label="weight" onchange="setVal('+oi+','+si+',\'w\',this.value)"><span class="u">'+wLbl()+'</span><button onclick="step('+oi+','+si+',\'w\',1)" aria-label="more weight">+</button></div>';
      var runit=o.unit==="s"?'<span class="u">s</span>':'';
      var rcell='<div class="stp"><button onclick="step('+oi+','+si+',\'reps\',-1)" aria-label="less reps">&minus;</button><input class="val num" inputmode="numeric" value="'+s.reps+'" aria-label="reps" onchange="setVal('+oi+','+si+',\'reps\',this.value)">'+runit+'<button onclick="step('+oi+','+si+',\'reps\',1)" aria-label="more reps">+</button></div>';
      setsHtml+='<div class="set'+(s.on?" on":"")+'" id="set-'+oi+'-'+si+'"><div class="sn">'+(si+1)+(o.side?'':'')+'</div>'+wcell+rcell+
        '<button class="tick" onclick="toggleSet('+oi+','+si+')" aria-label="complete set '+(si+1)+'">'+I.check+'</button></div>';
    });
    h+='<div class="ex" data-ex="'+oi+'"><div class="exhead"><div class="exname">'+esc(e.name)+(o.side?' <span style="font-size:12px;color:var(--faint);font-weight:600">/side</span>':'')+'</div>'+
      '<button class="more" onclick="exMenu('+oi+')" aria-label="Exercise options">'+I.more+'</button></div>'+
      '<div class="aim">'+aimText(o)+'</div>'+
      '<div class="colhead"><span>Set</span><span>'+(o.bw?"Load":"Weight")+'</span><span>'+(o.unit==="s"?"Time":"Reps")+'</span><span></span></div>'+
      setsHtml+
      '<div class="setbtns"><button class="setbtn" onclick="addSet('+oi+')">+ Add set</button>'+(o.sets.length>1?'<button class="setbtn rm" onclick="removeSet('+oi+')">&minus; Remove set</button>':'')+'</div></div>';
  });
  h+='<div class="warmcard"><b>Cooldown (2-3 min):</b> '+COOL+'</div>';
  document.getElementById("wo-body").innerHTML=h;
}
function step(oi,si,f,dir){var o=S.wk[TODAY].order[oi],s=o.sets[si];
  if(f==="w"){var v=(parseFloat(s.w)||0)+dir*inc();s.w=Math.max(0,Math.round(v*10)/10);}
  else{var d=o.unit==="s"?5:1;s.reps=Math.max(0,(parseInt(s.reps)||0)+dir*d);}
  save();
  var el=document.getElementById("set-"+oi+"-"+si);if(el){var inp=el.querySelectorAll(".val");inp[0].value=s.w;inp[1].value=s.reps;}
}
function setVal(oi,si,f,v){var s=S.wk[TODAY].order[oi].sets[si];v=(""+v).replace(/[^0-9.]/g,"");s[f]=f==="w"?(v===""?0:parseFloat(v)):(v===""?0:parseInt(v));save();}
function toggleSet(oi,si){var o=S.wk[TODAY].order[oi],s=o.sets[si],el=document.getElementById("set-"+oi+"-"+si);
  s.on=!s.on;save();el.classList.toggle("on",s.on);
  var last=(oi===S.wk[TODAY].order.length-1&&si===o.sets.length-1);
  if(s.on&&!last){startRest(S.profile.rest||90);if(navigator.vibrate)navigator.vibrate(12);}
  if(s.on&&last)endRest();
}
function addSet(oi){var o=S.wk[TODAY].order[oi],last=o.sets[o.sets.length-1];o.sets.push({w:last?last.w:o.weight,reps:o.low,on:false});save();renderWorkout();}
function removeSet(oi){var o=S.wk[TODAY].order[oi];if(o.sets.length>1){o.sets.pop();save();renderWorkout();}}
function exMenu(oi){
  var o=S.wk[TODAY].order[oi],e=LIB[o.exId];
  var m='<div class="grab"></div><h3>'+esc(e.name)+'</h3><div class="ssub">'+PATTERNS[e.pattern]+' &middot; '+e.equip+'</div>';
  m+=optRow(I.swap,"Swap exercise","Same movement, different lift","swapSheet("+oi+")");
  m+=optRow(I.play,"Watch form","Opens a video search","openForm(\'"+e.q+"\')");
  if(S.wk[TODAY].order.length>1)m+=optRow(I.trash,"Remove from today","","removeEx("+oi+")",true);
  openSheet(m);
}
function openForm(q){window.open(ytSearch(q),"_blank","noopener");closeSheet();}
function swapSheet(oi){
  var o=S.wk[TODAY].order[oi],e=LIB[o.exId];
  var alts=Object.keys(LIB).filter(function(id){return LIB[id].pattern===e.pattern&&id!==o.exId;});
  var m='<div class="grab"></div><h3>Swap '+esc(e.name)+'</h3><div class="ssub">'+PATTERNS[e.pattern]+' alternatives</div>';
  alts.forEach(function(id){var a=LIB[id];m+='<button class="opt" onclick="doSwap('+oi+',\''+id+'\')"><span class="oi">'+(a.equip==="band"?I.spark:a.bw?I.bolt:I.dumbbell)+'</span><span><div class="on2">'+esc(a.name)+'</div><div class="oc">'+a.equip+' &middot; '+a.diff+' &middot; '+esc(a.cue)+'</div></span><span class="oar">'+I.arrow+'</span></button>';});
  openSheet(m);
}
function doSwap(oi,id){var o=S.wk[TODAY].order[oi],e=LIB[id];
  o.exId=id;o.unit=e.unit||"reps";o.side=!!e.side;o.bw=!!e.bw;
  o.sets.forEach(function(s){if(e.bw)s.w=0;});
  save();closeSheet();renderWorkout();}
function removeEx(oi){var o=S.wk[TODAY].order[oi];var rm=S.wk[TODAY].order.splice(oi,1)[0];save();closeSheet();renderWorkout();
  toast("Removed "+LIB[rm.exId].name,function(){S.wk[TODAY].order.splice(oi,0,rm);save();renderWorkout();});}
function finishWorkout(){
  var w=S.wk[TODAY];if(!w)return;var wp=wkProgress();
  if(wp.done===0){toast("Log at least one set first, or leave with Back.",null);return;}
  if(wp.done<wp.total){openSheet('<div class="grab"></div><h3>Finish early?</h3><div class="ssub">You logged '+wp.done+' of '+wp.total+' sets.</div>'+
    '<button class="sheet-cta" onclick="closeSheet();doFinish()">Finish anyway</button><button class="sheet-cta ghost" onclick="closeSheet()">Keep going</button>');return;}
  doFinish();
}
function doFinish(){
  var w=S.wk[TODAY];var dur=w.start?Math.floor((Date.now()-w.start)/1000):0;
  var entries=[],setsN=0,vol=0,prs=[];
  w.order.forEach(function(o){
    var sets=o.sets.filter(function(s){return s.on;}).map(function(s){setsN++;vol+=(parseFloat(s.w)||0)*(parseInt(s.reps)||0);return {weightLb:parseFloat(s.w)||0,reps:parseInt(s.reps)||0,completed:true};});
    if(!sets.length)return;
    var prevPR=prFor(o.exId);
    entries.push({exerciseId:o.exId,targetLow:o.low,targetHigh:o.high,targetWeightLb:o.weight,location:S.profile.loc,sets:sets});
    // progression
    applyProgression(o,sets);
    // PR check (after pushing? compute vs prev)
    var newBest=null;sets.forEach(function(s){var v=e1rm(s.weightLb,s.reps);if(!newBest||v>newBest.e)newBest={w:s.weightLb,r:s.reps,e:v};});
    if(newBest&&(!prevPR||newBest.e>prevPR.e+0.01)&&!o.bw)prs.push(LIB[o.exId].name+" "+newBest.w+wLbl()+" x"+newBest.r);
    else if(newBest&&o.bw&&(!prevPR||newBest.r>prevPR.r))prs.push(LIB[o.exId].name+" x"+newBest.r);
  });
  var rec={id:TODAY,date:TODAY,type:"lift",dayLetter:w.letter,durationSec:dur,rpe:null,notes:"",entries:entries};
  S.sessions=S.sessions.filter(function(s){return s.id!==TODAY;});S.sessions.push(rec);
  S.done[TODAY]=true;S.planPos=((S.planPos||0)+1)%3;
  if(woTimer){clearInterval(woTimer);woTimer=null;}endRest();save();
  var body='<div class="grab"></div><div class="celebrate"><div class="ring">'+I.check+'</div><h3>Nice work</h3><div class="ssub">Day '+w.letter+' &middot; '+w.name+'</div>'+
    '<div class="sumgrid"><div class="sg"><b class="num">'+setsN+'</b><span>sets</span></div><div class="sg"><b class="num">'+Math.round(vol).toLocaleString()+'</b><span>'+wLbl()+' lifted</span></div><div class="sg"><b class="num">'+mmss(dur)+'</b><span>time</span></div></div>'+
    (prs.length?'<div class="prbadge">'+I.trophy+' New PR: '+esc(prs.slice(0,2).join(" &middot; "))+'</div>':'')+
    '<button class="sheet-cta" onclick="rpeSheet()">Add effort &amp; notes</button><button class="sheet-cta ghost" onclick="closeSheet();show(\'today\')">Done</button></div>';
  openSheet(body);
}
function applyProgression(o,sets){
  var t=S.progress[o.exId]||{low:o.low,high:o.high,weight:o.weight};
  var allHigh=sets.length>0&&sets.every(function(s){return (s.reps||0)>=o.high;});
  var anyLow=sets.some(function(s){return (s.reps||0)<o.low;});
  if(allHigh){
    if(o.bw||S.profile.loc==="Miami"){ // rep/tempo ladder
      if(o.high<20){t.low=o.high;t.high=o.high+2;}else{t.note="graduate - swap to a harder variation";}
      t.weight=o.weight;
    }else{ // Boca: load
      t.weight=(parseFloat(o.weight)||0)+inc();t.low=8;t.high=12;
    }
  }else if(anyLow){t.low=o.low;t.high=o.high;t.weight=o.weight;}
  else{t.low=o.low;t.high=o.high;t.weight=o.weight;}
  t.ladderStep=(o.bw||S.profile.loc==="Miami")?"reps":"load";
  S.progress[o.exId]=t;
}
function rpeSheet(){
  var opts=[6,7,8,9].map(function(n){return '<button onclick="setRpe('+n+',this)">'+n+'</button>';}).join("");
  openSheet('<div class="grab"></div><h3>How hard was it?</h3><div class="ssub">RPE 6 easy &rarr; 9 near failure. Optional.</div>'+
    '<div class="rpe">'+opts+'</div><textarea class="ta" id="rpe-notes" placeholder="Notes (optional): how the shoulder felt, energy, anything to remember next time"></textarea>'+
    '<button class="sheet-cta" onclick="saveRpe()">Save</button><button class="sheet-cta ghost" onclick="closeSheet();show(\'today\')">Skip</button>');
}

/* ============ REST ============ */
var restEnd=0,restTot=0,restInt=null;
function startRest(sec){restTot=sec;restEnd=Date.now()+sec*1000;var rb=document.getElementById("restbar");rb.classList.add("on");drawRest();if(restInt)clearInterval(restInt);restInt=setInterval(function(){if(drawRest()<=0){endRest();if(navigator.vibrate)navigator.vibrate([20,60,20]);}},250);}
function drawRest(){var left=Math.round((restEnd-Date.now())/1000);document.getElementById("rest-t").textContent=mmss(Math.max(left,0));document.getElementById("rest-fill").style.width=(restTot?Math.max(left,0)/restTot*100:0)+"%";document.getElementById("restbar").classList.toggle("warn",left<=5&&left>0);return left;}
function bumpRest(d){restEnd+=d*1000;restTot=Math.max(restTot,Math.round((restEnd-Date.now())/1000));drawRest();}
function endRest(){if(restInt){clearInterval(restInt);restInt=null;}var rb=document.getElementById("restbar");if(rb){rb.classList.remove("on");rb.classList.remove("warn");}}

/* ============ RUN ============ */

    '<div class="pace">'+I.run+' '+esc(plan.label||"Easy")+' &middot; '+PACE_MI+' /mi</div></div>'+
    '<div class="card"><h3>How to run it</h3><div class="runstruct">'+
    '<div class="rs"><span class="n">1</span><span>Warm up easy, <b>5 min</b> brisk walk or slow jog</span></div>'+
    '<div class="rs"><span class="n">2</span><span><b>'+plan.dist+' mi</b> at a pace you can hold a conversation</span></div>'+
    '<div class="rs"><span class="n">3</span><span>Can\'t talk in sentences? <b>Walk 30s</b>, restart</span></div>'+
    '<div class="rs"><span class="n">4</span><span>Cool down, <b>5 min</b> walk</span></div></div></div>';
  if(logged)h+='<div class="card"><h3>Logged today</h3><div class="weighrow" style="margin-top:8px"><span class="wcur"><b>'+logged.dist+' mi</b> in '+esc(logged.time)+' &middot; '+logged.pace+'/mi'+(logged.rpe?' &middot; '+esc(logged.rpe):'')+'</span><button class="wbtn" onclick="runSheet('+plan.dist+')">Edit</button></div></div>';
  else h+='<button class="big-start" onclick="runSheet('+plan.dist+')">'+I.check+' Log run</button>';

var rpeRun="";
function runSheet(dist){rpeRun="";
  openSheet('<div class="grab"></div><h3>Log run</h3><div class="ssub">Nice one. Punch in the numbers.</div>'+
    '<div class="logrow"><label>Distance</label><div class="inp"><input id="r-dist" inputmode="decimal" value="'+dist+'" oninput="calcPace()" aria-label="distance"><span class="u">mi</span></div></div>'+
    '<div class="logrow"><label>Time <span style="color:var(--faint);font-weight:500">mm:ss</span></label><div class="inp"><input id="r-time" inputmode="numeric" placeholder="22:40" oninput="calcPace()" aria-label="time" style="width:92px"></div></div>'+
    '<div class="paceout">pace<b id="r-pace">--:--</b></div>'+
    '<div class="rpe"><button onclick="pickRpe(this,\'Easy\')">Easy</button><button onclick="pickRpe(this,\'OK\')">OK</button><button onclick="pickRpe(this,\'Hard\')">Hard</button></div>'+
    '<button class="sheet-cta" onclick="saveRun()">Save run</button>');
}
function parseTime(t){t=(""+(t||"")).trim();if(!t)return null;if(t.indexOf(":")>=0){var p=t.split(":");var m=parseInt(p[0])||0,s=parseInt(p[1])||0;if(s>59)s=59;return m*60+s;}var n=parseFloat(t);if(isNaN(n))return null;return Math.round(n*60);}
function calcPace(){var d=parseFloat((document.getElementById("r-dist")||{}).value),sec=parseTime((document.getElementById("r-time")||{}).value),el=document.getElementById("r-pace");if(!el)return;el.textContent=(d>0&&sec>0)?mmss(Math.round(sec/d)):"--:--";}
function pickRpe(b,v){rpeRun=v;document.querySelectorAll(".rpe button").forEach(function(x){x.classList.remove("sel")});b.classList.add("sel");}
function saveRun(){var d=parseFloat((document.getElementById("r-dist")||{}).value),sec=parseTime((document.getElementById("r-time")||{}).value);if(!(d>0)){closeSheet();return;}
  var pace=sec>0?mmss(Math.round(sec/d)):"--:--",tstr=(document.getElementById("r-time")||{}).value||"--";
  S.runs[TODAY]={dist:d,time:tstr,pace:pace,rpe:rpeRun};
  S.sessions=S.sessions.filter(function(s){return !(s.id===TODAY&&s.type==="run");});
  S.sessions.push({id:TODAY,date:TODAY,type:"run",distanceMi:d,durationSec:sec||0,paceSecPerMi:sec>0?Math.round(sec/d):0,rpe:rpeRun,notes:""});
  S.done[TODAY]=true;save();closeSheet();
  var hot=(rpeRun==="Hard");
  if(hot)toast("Logged. Keep easy runs easy - that protects your lifting.",null);
  renderRun();
}
function weighSheet(){openSheet('<div class="grab"></div><h3>Weigh-in</h3><div class="ssub">Morning scale. One number.</div>'+
  '<div class="logrow"><label>Weight</label><div class="inp"><input id="w-val" inputmode="decimal" placeholder="0" aria-label="weight"><span class="u">'+wLbl()+'</span></div></div>'+
  '<button class="sheet-cta" onclick="saveWeigh()">Save</button>');}
function saveWeigh(){var v=parseFloat((document.getElementById("w-val")||{}).value);if(v>0){S.weigh=S.weigh.filter(function(x){return x.date!==TODAY;});S.weigh.push({date:TODAY,w:v});S.weigh.sort(function(a,b){return a.date<b.date?-1:1;});save();}closeSheet();renderToday();}

/* ============ WEEK ============ */
function renderWeek(){
  refreshDate();
  var mon=new Date(NOW);mon.setDate(NOW.getDate()-((DOW+6)%7));
  var doneLifts=0,totLifts=0,miDone=0,totMi=0,list="";
  for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);var k=keyOf(d),dw=d.getDay(),pl=(S.override[k]||WEEK[dw]),dn=isDone(k),isT=(k===TODAY);
    if(pl.type==="lift"){totLifts++;if(dn)doneLifts++;}if(pl.type==="run"){totMi+=pl.dist;if(S.runs[k])miDone+=(parseFloat(S.runs[k].dist)||0);}
    var ic=pl.type==="lift"?I.dumbbell:pl.type==="run"?I.run:I.rest;
    var nm=pl.type==="lift"?"Full-body strength":pl.type==="run"?(pl.label+" run"):"Rest";
    var tt=pl.type==="lift"?"~30 min":pl.type==="run"?(pl.dist+" mi"):(pl.weigh?"weigh-in":"anchor");
    list+='<button class="wl'+(dn?" done":"")+(isT?" today":"")+'" onclick="dayDetail(\''+k+'\')"><div class="wd">'+DFULL[dw]+'</div><div class="ic">'+(dn?I.check:ic)+'</div><div class="wn">'+nm+'</div><div class="wt">'+tt+'</div></button>';}
  var pct=totLifts?doneLifts/totLifts:0,C=2*Math.PI*45,off=C*(1-pct),complete=(totLifts>0&&doneLifts>=totLifts);
  var ring='<div class="ringcard'+(complete?" complete":"")+'"><div class="ringwrap"><svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="var(--surface-2)" stroke-width="9"/><circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg><div class="ctr"><b class="num">'+doneLifts+'/'+totLifts+'</b><span>workouts</span></div></div>'+
    '<div class="rmeta"><div class="rt">'+(complete?"Week complete":"Keep going")+'</div><div class="rd">'+computeStreak()+'-day streak &middot; consistency is the whole game.</div>'+
    '<div style="margin-top:8px"><div class="rd" style="margin:0">Running &middot; '+miDone.toFixed(1)+' / '+totMi+' mi</div><div class="mibar"><i style="width:'+(totMi?Math.min(100,miDone/totMi*100):0)+'%"></i></div></div></div></div>';
  document.getElementById("v-week").innerHTML='<div class="head"><div><div class="date">'+DFULL[mon.getDay()]+' '+(mon.getMonth()+1)+"/"+mon.getDate()+' &ndash; this week</div><div class="title">Week</div></div></div>'+ring+
    '<div class="card"><h3>The plan <span class="t">tap a day to view or edit</span></h3><div class="weeklist">'+list+'</div></div>';
}
function dayDetail(k){
  var lift=S.sessions.filter(function(s){return s.id===k&&s.type==="lift";})[0];
  var run=S.sessions.filter(function(s){return s.id===k&&s.type==="run";})[0];
  var m='<div class="grab"></div><h3>'+shortDate(k)+'</h3>';
  if(lift){m+='<div class="ssub">Day '+lift.dayLetter+' &middot; '+mmss(lift.durationSec)+(lift.rpe?' &middot; RPE '+lift.rpe:'')+'</div>';
    lift.entries.forEach(function(e){m+='<div style="padding:9px 0;border-bottom:1px solid var(--line)"><div style="font-weight:700;font-size:14.5px">'+esc(LIB[e.exerciseId]?LIB[e.exerciseId].name:e.exerciseId)+'</div><div style="font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums">'+e.sets.map(function(s){return (LIB[e.exerciseId]&&LIB[e.exerciseId].bw?"":s.weightLb+"x")+s.reps;}).join(", ")+'</div></div>';});
    if(lift.notes)m+='<div style="font-size:13px;color:var(--sub);margin-top:10px">Note: '+esc(lift.notes)+'</div>';
  }else if(run){m+='<div class="ssub">Easy run</div><div class="sumgrid"><div class="sg"><b>'+run.distanceMi+'</b><span>mi</span></div><div class="sg"><b>'+(run.paceSecPerMi?mmss(run.paceSecPerMi):"--")+'</b><span>/mi</span></div><div class="sg"><b>'+esc(run.rpe||"-")+'</b><span>effort</span></div></div>';
  }else{m+='<div class="ssub">Nothing logged this day.</div>';}
  if(lift||run)m+='<button class="sheet-cta ghost" onclick="deleteDay(\''+k+'\')">Delete this entry</button>';
  m+='<button class="sheet-cta'+(lift||run?" ghost":"")+'" onclick="closeSheet()">Close</button>';
  openSheet(m);
}
function deleteDay(k){S.sessions=S.sessions.filter(function(s){return s.id!==k;});delete S.runs[k];if(S.wk[k])delete S.wk[k];delete S.done[k];save();closeSheet();renderWeek();toast("Entry deleted",null);}

/* ============ PROGRESS ============ */
function renderProgress(){
  var e=ewma(),goal=S.profile.goalLb,streak=computeStreak();
  var lifts=S.sessions.filter(function(s){return s.type==="lift";}).length,runs=S.sessions.filter(function(s){return s.type==="run";}).length;
  var totMi=0;S.sessions.forEach(function(s){if(s.type==="run")totMi+=(s.distanceMi||0);});
  // weekly volume
  var volByWk={};S.sessions.forEach(function(s){if(s.type!=="lift")return;var wk=isoWeek(s.id),v=0;s.entries.forEach(function(en){en.sets.forEach(function(st){v+=(st.weightLb||0)*(st.reps||0);});});volByWk[wk]=(volByWk[wk]||0)+v;});
  var wks=Object.keys(volByWk).sort();var lastVol=wks.length?volByWk[wks[wks.length-1]]:0,prevVol=wks.length>1?volByWk[wks[wks.length-2]]:0;
  var tiles='<div class="stattiles">'+
    stat("Streak",streak,"days",streak?"":" ","flat")+
    stat("Bodyweight",e?e.toFixed(1):"--",wLbl()+(e?" avg":""),e?("goal "+goal):"log one","flat")+
    stat("Lifts logged",lifts,"sessions","","flat")+
    stat("Run total",totMi.toFixed(1),"mi","","flat")+'</div>';
  // weigh-in trend chart
  var trend=weighChart();
  // PRs
  var exIds=Object.keys(LIB).filter(function(id){return prFor(id);});
  var prHtml="";exIds.slice(0,12).forEach(function(id){var p=prFor(id);prHtml+='<div class="pr"><span class="pn">'+esc(LIB[id].name)+'</span><span class="pv">'+(LIB[id].bw?"x"+p.r:p.w+wLbl()+" x"+p.r)+'</span><span class="pd">'+shortDate(p.date)+'</span></div>';});
  var vol='<div class="stat" style="grid-column:1/-1"><div class="sl">This week volume</div><div class="sv num">'+Math.round(lastVol).toLocaleString()+' <small>'+wLbl()+'</small></div><div class="st'+(lastVol>=prevVol?"":" flat")+'">'+(prevVol?((lastVol>=prevVol?"+":"")+Math.round((lastVol-prevVol)).toLocaleString()+" vs last week"):"first week")+'</div></div>';
  document.getElementById("v-progress").innerHTML='<div class="head"><div><div class="date">Your trends</div><div class="title">Progress</div></div>'+
    '<button class="iconbtn" onclick="exportSheet()" aria-label="Export">'+I.send+'</button></div>'+
    tiles+trend+'<div class="stattiles">'+vol+'</div>'+
    (prHtml?'<div class="card"><h3>Personal records <span class="t">best estimated 1-rep</span></h3><div class="prlist">'+prHtml+'</div></div>':'<div class="card"><h3>Personal records</h3><div class="ssub" style="text-align:left;margin:8px 0 0">Finish a lift to start setting PRs.</div></div>')+
    '<button class="big-start" onclick="exportSheet()" style="margin-bottom:10px">'+I.send+' Send my data to Claude</button>'+
    '<div class="foot">Nothing here ever leaves your device until you tap Export and share it yourself.</div>';
}
function stat(l,v,u,t,cls){return '<div class="stat"><div class="sl">'+l+'</div><div class="sv num">'+v+' <small>'+u+'</small></div>'+(t?'<div class="st '+(cls||"")+'">'+t+'</div>':'')+'</div>';}
function weighChart(){
  if(S.weigh.length<1)return '<div class="trend"><h3 style="margin-bottom:8px">Weight trend</h3><div class="ssub" style="text-align:left">Log your weight on Sundays to see the trend toward '+S.profile.goalLb+'.</div></div>';
  var pts=S.weigh.slice(-40),ws=pts.map(function(p){return p.w;});
  var goal=S.profile.goalLb,stretch=S.profile.stretchLb;
  var mn=Math.min.apply(null,ws.concat([stretch]))-2,mx=Math.max.apply(null,ws.concat([goal]))+2;
  var W=300,H=110,pad=6;
  function x(i){return pad+(pts.length<=1?W/2:(i/(pts.length-1))*(W-2*pad));}
  function y(v){return pad+(1-(v-mn)/(mx-mn))*(H-2*pad);}
  // ewma line
  var a=0.12,ev=[],ee=ws[0];ws.forEach(function(w,i){ee=i===0?w:a*w+(1-a)*ee;ev.push(ee);});
  var line=ev.map(function(v,i){return (i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1);}).join(" ");
  var dots=pts.map(function(p,i){return '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(p.w).toFixed(1)+'" r="2.4" fill="var(--faint)"/>';}).join("");
  var gy=y(goal).toFixed(1),sy=y(stretch).toFixed(1);
  var cur=ev[ev.length-1];
  return '<div class="trend"><h3 style="margin-bottom:10px"><span>Weight trend</span><span class="t">now <b>'+cur.toFixed(1)+'</b> '+wLbl()+' &middot; goal '+goal+'</span></h3>'+
    '<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="display:block">'+
    '<line x1="0" y1="'+gy+'" x2="'+W+'" y2="'+gy+'" stroke="var(--good)" stroke-width="1" stroke-dasharray="4 4"/>'+
    '<line x1="0" y1="'+sy+'" x2="'+W+'" y2="'+sy+'" stroke="var(--line-2)" stroke-width="1" stroke-dasharray="2 4"/>'+
    '<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'</svg>'+
    '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--faint);font-weight:600;margin-top:4px"><span>goal '+goal+'</span><span>stretch '+stretch+'</span></div></div>';
}

/* ============ EXPORT / IMPORT ============ */
function buildJSON(){
  return {schema:"train.export",version:2,exportedAt:new Date().toString(),app:{name:"Train"},
    profile:{units:U()==="kg"?"metric":"imperial",bodyweightGoalLb:S.profile.goalLb,bodyweightStretchLb:S.profile.stretchLb,startDate:S.profile.started},
    sessions:S.sessions,weighins:S.weigh.map(function(w){return {date:w.date,weightLb:w.w};}),anchor:S.anchor,
    progressState:S.progress,
    derived:{note:"advisory; recompute from raw",streakDays:computeStreak(),bodyweightEwmaLb:ewma()}};
}
function buildSummary(){
  var e=ewma(),lifts=S.sessions.filter(function(s){return s.type==="lift";}),runs=S.sessions.filter(function(s){return s.type==="run";});
  var out="# Train Export - "+TODAY+"\n\n## Snapshot\n";
  out+="- Bodyweight: "+(e?e.toFixed(1)+" "+wLbl()+" (EWMA)":"not logged")+(S.weigh.length?", latest "+S.weigh[S.weigh.length-1].w+" ("+S.weigh[S.weigh.length-1].date+")":"")+". Goal "+S.profile.goalLb+" (stretch "+S.profile.stretchLb+").\n";
  out+="- Training streak: "+computeStreak()+" days. Sessions logged: "+lifts.length+" lifts, "+runs.length+" runs.\n\n";
  out+="## Personal Records\n";Object.keys(LIB).forEach(function(id){var p=prFor(id);if(p)out+="- "+LIB[id].name+": "+(LIB[id].bw?"x"+p.r:p.w+wLbl()+" x "+p.r)+" ("+p.date+")\n";});
  out+="\n## Recent Sessions\n";
  lifts.slice(-10).reverse().forEach(function(s){out+="### "+s.id+" - Day "+s.dayLetter+" - "+mmss(s.durationSec)+(s.rpe?" - RPE "+s.rpe:"")+"\n";s.entries.forEach(function(en){out+="- "+(LIB[en.exerciseId]?LIB[en.exerciseId].name:en.exerciseId)+": "+en.sets.map(function(st){return (LIB[en.exerciseId]&&LIB[en.exerciseId].bw?"":st.weightLb+"x")+st.reps;}).join(", ")+"\n";});if(s.notes)out+="  note: "+s.notes+"\n";});
  out+="\n## Runs\n";runs.slice(-10).reverse().forEach(function(s){out+="- "+s.id+": "+s.distanceMi+" mi in "+mmss(s.durationSec)+" ("+(s.paceSecPerMi?mmss(s.paceSecPerMi):"--")+"/mi) - "+(s.rpe||"")+"\n";});
  out+="\n## Weigh-ins\n";S.weigh.slice(-12).forEach(function(w){out+="- "+w.date+": "+w.w+" "+wLbl()+"\n";});
  return out;
}
function exportSheet(){
  var m='<div class="grab"></div><h3>Send to Claude</h3><div class="ssub">Copy this, paste it to Claude, and it records into your Training Log. Nothing is ever sent automatically.</div>';
  m+='<button class="sheet-cta" onclick="copyExport(\'both\')">'+"Copy summary + data"+'</button>';
  m+='<button class="sheet-cta ghost" onclick="downloadExport()">Download backup (.json)</button>';
  m+='<button class="sheet-cta ghost" onclick="importSheet()">Import / restore from backup</button>';
  m+='<div class="foot" style="padding:14px 0 2px">This page has no network access (blocked at the browser level). Your data only moves when you copy or download it.</div>';
  openSheet(m);
}
function copyExport(which){
  var txt=buildSummary()+"\n\n<!-- machine-readable backup -->\n```json\n"+JSON.stringify(buildJSON())+"\n```\n";
  copyText(txt,"Copied. Paste it to Claude to record.");
}
function copyText(txt,msg){
  function ok(){toast(msg,null);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok,function(){fallbackCopy(txt);ok();});}
  else{fallbackCopy(txt);ok();}
}
function fallbackCopy(txt){var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy")}catch(e){}document.body.removeChild(ta);}
function downloadExport(){var blob=new Blob([JSON.stringify(buildJSON(),null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="train-backup-"+TODAY+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url)},1000);toast("Backup downloaded.",null);}
function importSheet(){openSheet('<div class="grab"></div><h3>Import / restore</h3><div class="ssub">Paste a backup JSON. This replaces your current data (a backup is kept).</div>'+
  '<textarea class="ta" id="imp" placeholder=\'{"schema":"train.export",...}\' style="min-height:160px"></textarea>'+
  '<button class="sheet-cta" onclick="doImport()">Restore</button>');}
function doImport(){var t=(document.getElementById("imp")||{}).value;var o;try{o=JSON.parse(t)}catch(e){toast("That isn\'t valid JSON.",null);return;}
  if(!o||o.schema!=="train.export"){toast("Not a Train backup.",null);return;}
  try{localStorage.setItem("train_v2_backup",JSON.stringify(S))}catch(e){}
  if(o.sessions)S.sessions=o.sessions;if(o.weighins)S.weigh=o.weighins.map(function(w){return {date:w.date,w:w.weightLb};});
  if(o.anchor)S.anchor=o.anchor;if(o.progressState)S.progress=o.progressState;
  if(o.profile){S.profile.goalLb=o.profile.bodyweightGoalLb||S.profile.goalLb;S.profile.stretchLb=o.profile.bodyweightStretchLb||S.profile.stretchLb;}
  // rebuild done map from sessions
  S.sessions.forEach(function(s){S.done[s.id]=true;});save();closeSheet();toast("Restored.",null);show("progress");}

/* ============ LIBRARY ============ */
function ytSearch(q){return "https://www.youtube.com/results?search_query="+encodeURIComponent(q);}

    h+='</div>';});
  h+='<div class="sectlbl">Mobility &amp; running</div><div class="lib">';
  [["10-min morning mobility","10 minute morning mobility routine"],["Neck &amp; shoulder relief","neck and shoulder mobility routine desk"],["Hip-flexor / couch stretch","couch stretch hip flexor how to"],["T-spine mobility","thoracic spine mobility routine"],["Run warm-up","dynamic warm up before running"],["Why Zone-2 easy running","zone 2 easy running explained"],["Runner cool-down","runner cool down stretch routine"]].forEach(function(r){h+='<a href="'+ytSearch(r[1])+'" target="_blank" rel="noopener"><span class="li">'+I.rest+'</span><span><div class="ln">'+r[0]+'</div><div class="lc">follow-along search</div></span><span class="lar">'+I.arrow+'</span></a>';});
  h+='</div>';
  document.getElementById("v-library").innerHTML=h;
}

/* ============ SETTINGS ============ */
function settingsSheet(){
  var p=S.profile;
  var m='<div class="grab"></div><h3>Settings</h3><div class="ssub">Everything here stays on your device.</div>';
  m+='<div class="setrow"><div><div class="sk">Name</div></div><input class="tin" style="max-width:170px" value="'+esc(p.name)+'" oninput="S.profile.name=this.value.slice(0,24);save()" aria-label="name"></div>';
  m+='<div class="setrow"><div><div class="sk">Units</div></div><div class="seg" style="max-width:150px"><button class="'+(p.units==="lb"?"sel":"")+'" onclick="setUnits(\'lb\',this)">lb</button><button class="'+(p.units==="kg"?"sel":"")+'" onclick="setUnits(\'kg\',this)">kg</button></div></div>';
  m+='<div class="setrow"><div><div class="sk">Location</div><div class="skc">Miami = 15lb cap (progress reps) &middot; Boca = add weight</div></div><div class="seg" style="max-width:150px"><button class="'+(p.loc==="Miami"?"sel":"")+'" onclick="setLoc(\'Miami\',this)">Miami</button><button class="'+(p.loc==="Boca"?"sel":"")+'" onclick="setLoc(\'Boca\',this)">Boca</button></div></div>';
  m+='<div class="setrow"><div><div class="sk">Rest timer</div></div><div class="stp sheetstp"><button onclick="setRest(-15,this)">&minus;</button><span class="val num" id="rest-set">'+(p.rest||90)+'</span><span class="u">s</span><button onclick="setRest(15,this)">+</button></div></div>';
  m+='<div class="setrow"><div><div class="sk">Theme</div></div><div class="seg" style="max-width:210px"><button class="'+(p.theme==="light"?"sel":"")+'" onclick="setTheme(\'light\',this)">Light</button><button class="'+(p.theme==="dark"?"sel":"")+'" onclick="setTheme(\'dark\',this)">Dark</button><button class="'+((!p.theme||p.theme==="system")?"sel":"")+'" onclick="setTheme(\'system\',this)">Auto</button></div></div>';
  m+='<div class="setrow"><div><div class="sk">Goal weight</div></div><div class="inp" style="max-width:150px"><input inputmode="decimal" value="'+p.goalLb+'" onchange="S.profile.goalLb=parseFloat(this.value)||180;save()" style="width:60px" aria-label="goal"><span class="u">'+wLbl()+'</span></div></div>';
  m+='<button class="sheet-cta ghost" onclick="exportSheet()">'+"Export / backup data"+'</button>';
  m+='<button class="sheet-cta ghost" onclick="confirmReset()" style="color:var(--accent)">Reset all data</button>';
  openSheet(m);
}
function setUnits(u,b){S.profile.units=u;save();segSel(b);toast("Units set to "+u,null);}
function setLoc(l,b){S.profile.loc=l;save();segSel(b);}
function setRest(d,b){S.profile.rest=Math.max(30,Math.min(240,(S.profile.rest||90)+d));document.getElementById("rest-set").textContent=S.profile.rest;save();}
function segSel(b){var p=b.parentNode;p.querySelectorAll("button").forEach(function(x){x.classList.remove("sel")});b.classList.add("sel");}
function setTheme(t,b){S.profile.theme=t;save();applyTheme();if(b)segSel(b);}
function applyTheme(){var t=S.profile.theme;if(!t||t==="system")document.documentElement.removeAttribute("data-theme");else document.documentElement.setAttribute("data-theme",t);
  var m=document.getElementById("theme-color");if(m)m.setAttribute("content",getComputedStyle(document.documentElement).getPropertyValue("--bg").trim()||"#F7F8FA");}
function confirmReset(){openSheet('<div class="grab"></div><h3>Reset everything?</h3><div class="ssub">This erases all your logged data on this device. Export a backup first if you want to keep it.</div>'+
  '<button class="sheet-cta ghost" onclick="exportSheet()">Export backup first</button>'+
  '<button class="sheet-cta" style="background:var(--accent)" onclick="doReset()">Erase all data</button>');}
function doReset(){try{localStorage.removeItem(LS)}catch(e){}S=seed();S.profile.setup=true;save();closeSheet();show("today");toast("All data cleared.",null);}

/* ============ first-run ============ */
function firstRun(){
  var m='<div class="grab"></div><h3>Welcome to Train</h3><div class="ssub">Two taps and you\'re set. Everything stays on your device.</div>';
  m+='<div class="logrow"><label>Name</label><input class="tin" style="max-width:180px" id="fr-name" placeholder="optional" aria-label="name"></div>';
  m+='<div class="logrow"><label>Units</label><div class="seg" style="max-width:150px"><button class="sel" id="fru-lb" onclick="frUnit(\'lb\')">lb</button><button id="fru-kg" onclick="frUnit(\'kg\')">kg</button></div></div>';
  m+='<div class="logrow"><label>Where do you train?</label><div class="seg" style="max-width:160px"><button class="sel" id="frl-m" onclick="frLoc(\'Miami\')">Miami</button><button id="frl-b" onclick="frLoc(\'Boca\')">Boca</button></div></div>';
  m+='<div class="logrow"><label>Bodyweight <span style="color:var(--faint);font-weight:500">(optional)</span></label><div class="inp" style="max-width:140px"><input id="fr-bw" inputmode="decimal" placeholder="190" style="width:56px" aria-label="bodyweight"><span class="u" id="fr-bwu">lb</span></div></div>';
  m+='<button class="sheet-cta" onclick="finishSetup()">Start training</button>';
  openSheet(m);
}
var frU="lb",frL="Miami";
function frUnit(u){frU=u;document.getElementById("fru-lb").classList.toggle("sel",u==="lb");document.getElementById("fru-kg").classList.toggle("sel",u==="kg");document.getElementById("fr-bwu").textContent=u;}
function frLoc(l){frL=l;document.getElementById("frl-m").classList.toggle("sel",l==="Miami");document.getElementById("frl-b").classList.toggle("sel",l==="Boca");}
function finishSetup(){S.profile.name=(document.getElementById("fr-name")||{}).value||"";S.profile.units=frU;S.profile.loc=frL;
  var bw=parseFloat((document.getElementById("fr-bw")||{}).value);if(bw>0)S.weigh.push({date:TODAY,w:bw});
  S.profile.setup=true;S.profile.started=TODAY;save();closeSheet();renderToday();}

/* ============ sheet + toast ============ */
function openSheet(html){document.getElementById("sheet").innerHTML=html;document.getElementById("scrim").classList.add("on");}
function closeSheet(){document.getElementById("scrim").classList.remove("on");}
document.getElementById("scrim").addEventListener("click",function(e){if(e.target===this)closeSheet();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeSheet();});
var toastT=null,toastUndo=null;
function toast(msg,undo){var t=document.getElementById("toast");document.getElementById("toast-m").textContent=msg;
  var ub=document.getElementById("toast-u");ub.style.display=undo?"block":"none";toastUndo=undo||null;
  t.classList.add("on");if(toastT)clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove("on")},undo?5000:2600);}
document.getElementById("toast-u").addEventListener("click",function(){if(toastUndo)toastUndo();document.getElementById("toast").classList.remove("on");});

/* ============ boot ============ */
applyTheme();
if(!S.profile.setup){firstRun();}
document.addEventListener("visibilitychange",function(){if(!document.hidden){refreshDate();if(document.getElementById("v-today").classList.contains("on"))renderToday();}});
renderToday();
</script>
</body>
</html>
