<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audit — Greatest Bits</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e8341c;--cream:#fff3e4;--yellow:#ffd23e;--ink:#0d0d0d;--mut:#8a7a64;--ok:#2e7d32}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
a{color:inherit}img{display:block;max-width:100%}
/* top bar */
.bar{position:sticky;top:0;z-index:20;background:var(--ink);color:var(--cream);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:3px solid var(--yellow)}
.bar .logo{font-family:'Anton',sans-serif;font-size:18px;text-transform:uppercase}.bar .logo b{color:var(--yellow);font-weight:400}
.bar .prog{flex:1;min-width:200px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#cfc6b4}
.bar .prog b{color:var(--yellow)}
.bar .pbar{height:7px;background:#2a2a2a;border-radius:4px;overflow:hidden;margin-top:5px}
.bar .pbar i{display:block;height:100%;background:var(--yellow)}
.bar button{font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;border:2px solid var(--cream);background:none;color:var(--cream);border-radius:8px;padding:7px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:.03em}
.bar button:hover{border-color:var(--yellow);color:var(--yellow)}
.bar button.exp{background:var(--yellow);color:var(--ink);border-color:var(--yellow)}
.wrap{max-width:1000px;margin:0 auto;padding:20px}
.status{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:999px;display:inline-block}
.status.verified{background:var(--ok);color:#fff}.status.issues{background:var(--red);color:#fff}.status.unseen{background:#e3d9c5;color:var(--mut)}
/* head */
.top{display:grid;grid-template-columns:230px 1fr;gap:26px;align-items:start;margin-top:8px}
.ph{position:relative;width:230px;aspect-ratio:3/4;border:3px solid var(--ink);overflow:hidden;background:#e7ddc9}
.ph img{width:100%;height:100%;object-fit:cover;object-position:50% 12%}
.ph .ini{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:74px;color:var(--ink);background:var(--yellow)}
.idx{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em}
h1{font-family:'Anton',sans-serif;font-size:clamp(40px,7vw,72px);text-transform:uppercase;line-height:.86;margin:4px 0 10px}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.pill{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;border:2px solid var(--ink);border-radius:999px;padding:4px 10px;background:#fff}
.blurb{font-family:'Fraunces',Georgia,serif;font-size:18px;color:#332c22;line-height:1.5;max-width:60ch}
/* flag chips */
.flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.fl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;border:1.5px solid #c9b98f;background:#fff;color:var(--mut);border-radius:6px;padding:4px 9px;cursor:pointer;transition:.12s}
.fl:hover{border-color:var(--red);color:var(--red)}
.fl.on{background:var(--red);color:#fff;border-color:var(--red)}
/* machine sweep panel */
.msweep{background:#fff8d9;border:2px solid var(--yellow);border-left:7px solid var(--yellow);border-radius:9px;padding:10px 13px 12px;margin:14px 0 6px}
.msweep .mh{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7a5d00;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.msweep .mh b{background:var(--ink);color:var(--yellow);padding:2px 7px;border-radius:5px;font-weight:800;font-size:10.5px}
.msweep .mh .ma{margin-left:auto;display:flex;gap:6px}
.msweep .mh button{font-family:'Archivo';font-weight:800;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;border:2px solid var(--ink);background:#fff;color:var(--ink);border-radius:6px;padding:4px 9px;cursor:pointer}
.msweep .mh button:hover{background:var(--ink);color:var(--yellow)}
.mrow{display:grid;grid-template-columns:1fr auto auto;gap:9px;align-items:center;padding:7px 0;border-top:1px solid #ebd58a}
.mrow:first-of-type{border-top:none}
.mrow.dismissed{opacity:.4}
.mrow.confirmed .mlbl{color:var(--red)}
.mlbl{font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.35;color:#3b2f10}
.mlbl .mk{font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;background:var(--ink);color:var(--yellow);padding:2px 6px;border-radius:4px;margin-right:6px;vertical-align:middle}
.mlbl .mi{font-family:'Archivo';font-weight:800;font-size:11.5px;color:#000;margin-right:6px}
.mlbl .mr{color:#5c4b1f;font-size:12px}
.mbtn{font-family:'Archivo';font-weight:800;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;border:2px solid var(--ink);background:#fff;color:var(--ink);border-radius:6px;padding:5px 9px;cursor:pointer;white-space:nowrap}
.mbtn.cf{background:var(--red);color:#fff;border-color:var(--red)}
.mbtn.cf:hover{background:#a52410}
.mbtn.ds:hover{background:#eee}
.mrow.confirmed .mbtn.cf{background:#fff;color:var(--red);border-color:var(--red)}
.mrow.dismissed .mbtn.ds{background:var(--ink);color:#fff;border-color:var(--ink)}
.msweep .clean{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7a5d00;font-style:italic}
.lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);font-weight:600;margin:22px 0 8px;border-top:2px solid #e3d9c5;padding-top:12px}
/* links */
.lk{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
.lk .nm{font-family:'Archivo';font-weight:800;font-size:13px;min-width:90px}
.lk a{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink);text-decoration:underline;word-break:break-all}
.lk .miss{font-family:'IBM Plex Mono';font-size:11px;color:var(--mut)}
/* specials + bits cards */
.card{border:2px solid var(--ink);background:#fff;border-radius:9px;padding:12px 13px;margin-bottom:10px}
.card .row{display:flex;gap:13px;align-items:flex-start}
.card .pos{width:52px;height:74px;border:2px solid var(--ink);overflow:hidden;background:#e7ddc9;flex:0 0 auto}
.card .pos img{width:100%;height:100%;object-fit:cover}.card .pos .none{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:16px;color:#c5b48a;background:#efe6d3}
.card .t{font-family:'Archivo';font-weight:900;font-size:15px;line-height:1.1}
.card .m{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);margin-top:3px}
.card .w{font-family:'IBM Plex Mono';font-size:11px;color:var(--red);text-decoration:underline}
.pb{font-family:'Archivo';font-weight:800;font-size:11px;color:var(--ink);background:var(--yellow);border:2px solid var(--ink);border-radius:6px;padding:5px 10px;cursor:pointer;white-space:nowrap}
.embed{margin-top:10px}.embed iframe{width:100%;max-width:560px;aspect-ratio:16/9;border:0;border-radius:8px}
.note{width:100%;margin-top:8px;border:2px solid var(--ink);border-radius:8px;padding:8px 10px;font-family:'Inter';font-size:13px;resize:vertical;min-height:42px}
/* bottom controls */
.ctrl{position:sticky;bottom:0;background:var(--cream);border-top:3px solid var(--ink);padding:12px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:24px}
.ctrl button{font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;border:2px solid var(--ink);border-radius:9px;padding:11px 16px;cursor:pointer;background:#fff;text-transform:uppercase;letter-spacing:.03em}
.ctrl button.v{background:var(--ok);color:#fff;border-color:var(--ink)}
.ctrl button.nextun{background:var(--yellow)}
.ctrl .hint{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--mut);margin-left:auto}
.empty{font-family:'IBM Plex Mono';font-size:12px;color:var(--mut);padding:8px 0}
/* rank mode */
#rankview{max-width:880px;margin:0 auto;padding:26px 20px 60px}
.rk-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;text-align:center;margin-bottom:6px}
.rk-head{font-family:'Anton',sans-serif;font-size:clamp(32px,6vw,56px);text-transform:uppercase;line-height:.88;text-align:center;margin:2px 0 6px}
.rk-q{font-family:'Fraunces',Georgia,serif;font-size:17px;color:#4a4030;text-align:center;margin:0 auto 22px;max-width:48ch}
.rk-stage{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:720px;margin:0 auto;position:relative}
.rk-card{border:3px solid var(--ink);background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .12s;text-align:center}
.rk-card:hover{transform:translateY(-5px);box-shadow:9px 9px 0 var(--ink)}
.rk-card:active{transform:translateY(-1px)}
.rk-face{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:50% 12%;background:#e7ddc9}
.rk-face .ini{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:64px;color:var(--ink);background:var(--yellow)}
.rk-nm{font-family:'Anton',sans-serif;font-size:clamp(17px,3.4vw,27px);text-transform:uppercase;padding:11px 8px;line-height:.95}
.rk-or{position:absolute;left:50%;top:38%;transform:translateY(-50%);width:46px;height:46px;margin-left:-23px;border-radius:50%;background:var(--red);color:#fff;font-family:'Anton';font-size:16px;display:flex;align-items:center;justify-content:center;border:3px solid var(--ink);z-index:2;pointer-events:none}
.rk-tools{display:flex;gap:10px;justify-content:center;margin-top:26px;flex-wrap:wrap}
.rk-tools button{font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;border:2px solid var(--ink);border-radius:9px;padding:9px 14px;cursor:pointer;background:#fff;text-transform:uppercase;letter-spacing:.03em}
.rk-tools button.exp{background:var(--yellow)}
.rk-final{list-style:none;max-width:560px;margin:0 auto;counter-reset:none}
.rk-final li{display:flex;align-items:center;gap:11px;padding:7px 4px;border-bottom:1px solid #e3d9c5}
.rk-r{font-family:'Anton',sans-serif;font-size:20px;width:34px;text-align:right;color:var(--red)}
.rk-mini{width:34px;height:46px;border:2px solid var(--ink);object-fit:cover;object-position:50% 12%;background:#e7ddc9;flex:0 0 auto}
.rk-mini .ini{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:14px;background:var(--yellow);color:var(--ink)}
.rk-fn{font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;flex:1}
.rk-seed{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--mut)}
.rk-up{font-family:'IBM Plex Mono';font-size:11px;color:var(--ok);font-weight:600;min-width:34px;text-align:right}
.rk-dn{font-family:'IBM Plex Mono';font-size:11px;color:var(--red);font-weight:600;min-width:34px;text-align:right}
.rk-eq{font-family:'IBM Plex Mono';font-size:11px;color:var(--mut);min-width:34px;text-align:right}
</style>
</head>
<body>
<div class="bar">
  <span class="logo">Audit <b>·</b> GB</span>
  <div class="prog"><span id="ptext"></span><div class="pbar"><i id="pfill"></i></div></div>
  <button id="jump">Next unaudited</button>
  <button id="mode-rank">Rank comics</button>
  <button class="exp" id="export">Export flags</button>
</div>
<div class="wrap" id="app"><div class="empty">Loading roster…</div></div>
<div class="ctrl">
  <button id="prev">&#8592; Prev</button>
  <button id="next">Next &#8594;</button>
  <button class="v" id="verify">&#10003; Verify &amp; next</button>
  <span class="hint">keys: &#8592;/&#8594; move &middot; V verify+next &middot; N next unaudited</span>
</div>
<div id="rankview" style="display:none"></div>

<script>
var KEY="gbAudit_v1";
var MDKEY="gbAuditMD_v1"; // machine-flag dispositions: {cid:{flagKey:"confirmed"|"dismissed"}}
var AUD=JSON.parse(localStorage.getItem(KEY)||"{}"); // {id:{status,flags:[{field,issue}],note,ts}}
var MD=JSON.parse(localStorage.getItem(MDKEY)||"{}");
var ROST=[],i=0,cur=null,curId=null;
function save(){localStorage.setItem(KEY,JSON.stringify(AUD));updateProg();}
function saveMD(){localStorage.setItem(MDKEY,JSON.stringify(MD));}
function rec(id){if(!AUD[id])AUD[id]={status:"unseen",flags:[],note:""};return AUD[id];}
function hasFlag(id,field,issue){return rec(id).flags.some(function(f){return f.field===field&&f.issue===issue;});}
function addFlag(id,field,issue){if(hasFlag(id,field,issue))return;var r=rec(id);r.flags.push({field:field,issue:issue});if(r.status==="unseen")r.status="issues";save();}
function removeFlag(id,field,issue){var r=rec(id);var k=r.flags.findIndex(function(f){return f.field===field&&f.issue===issue;});if(k>-1)r.flags.splice(k,1);if(r.flags.length===0&&r.status==="issues")r.status="unseen";save();}
function toggleFlag(id,field,issue){if(hasFlag(id,field,issue))removeFlag(id,field,issue);else addFlag(id,field,issue);}
function mkey(f){return f.field+"|"+f.issue+"|"+(f.reason||"");}
function mstate(cid,k){return (MD[cid]&&MD[cid][k])||"pending";}
function msetState(cid,k,st){if(!MD[cid])MD[cid]={};if(st==="pending")delete MD[cid][k];else MD[cid][k]=st;if(MD[cid]&&!Object.keys(MD[cid]).length)delete MD[cid];saveMD();}
function statusOf(id){return (AUD[id]&&AUD[id].status)||"unseen";}
function updateProg(){var done=ROST.filter(function(c){return statusOf(c.id)!=="unseen";}).length;var flagged=ROST.filter(function(c){return statusOf(c.id)==="issues";}).length;document.getElementById("ptext").innerHTML="<b>"+done+"</b> / "+ROST.length+" audited &middot; "+flagged+" flagged";document.getElementById("pfill").style.width=(ROST.length?Math.round(done/ROST.length*100):0)+"%";}
function chip(field,issue,id){return '<span class="fl'+(hasFlag(id,field,issue)?" on":"")+'" data-field="'+field+'" data-issue="'+issue+'">'+issue+'</span>';}
function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

async function load(idx){
 i=(idx+ROST.length)%ROST.length;var c=ROST[i];curId=c.id;
 var app=document.getElementById("app");app.innerHTML='<div class="empty">Loading '+esc(c.name)+'…</div>';
 var x={};try{var r=await fetch("data/comics/"+c.id+".json?v="+Date.now());if(r.ok)x=await r.json();}catch(e){}
 cur=x;
 var photo=x.photo||c.photo_url;
 var st=statusOf(c.id);
 var h='<div class="idx">Comic '+(i+1)+' / '+ROST.length+' &middot; id: '+esc(c.id)+' &middot; <span class="status '+st+'">'+st+'</span></div>';
 h+='<div class="top"><div class="ph">'+(photo?'<img src="'+esc(photo)+'" alt="">':'<span class="ini">'+esc((c.name||"?").slice(0,2).toUpperCase())+'</span>')+'</div><div>';
 h+='<h1>'+esc(c.name)+'</h1>';
 h+='<div class="pills">'+[x.years,x.nat||c.nationality,x.era||c.era].filter(Boolean).map(function(p){return '<span class="pill">'+esc(p)+'</span>';}).join("")+'</div>';
 h+='<div class="lbl" style="border:none;margin-top:0;padding-top:0">Photograph &mdash; is this actually '+esc(c.name)+'?</div><div class="flags">'+chip("photo","wrong person",c.id)+chip("photo","low quality",c.id)+chip("photo","bad crop",c.id)+chip("photo","missing",c.id)+'</div>';
 h+='<div class="lbl">Bio</div><div class="blurb">'+(esc(x.bio||c.blurb)||'<span class="empty">No bio.</span>')+'</div><div class="flags">'+chip("bio","wrong",c.id)+chip("bio","too thin",c.id)+chip("bio","rewrite",c.id)+'</div>';
 h+='</div></div>';
 // machine sweep panel — pre-populated flags from the offline sweep
 var MF=((x.flags||{}).machine)||[];
 if(MF.length){
  var pend=MF.filter(function(f){return mstate(c.id,mkey(f))==="pending";}).length;
  var conf=MF.filter(function(f){return mstate(c.id,mkey(f))==="confirmed";}).length;
  var dism=MF.filter(function(f){return mstate(c.id,mkey(f))==="dismissed";}).length;
  h+='<div class="msweep" id="mswp"><div class="mh"><b>Machine sweep</b> '+MF.length+' issue'+(MF.length===1?'':'s')+' flagged &middot; '+pend+' pending &middot; '+conf+' confirmed &middot; '+dism+' dismissed <span class="ma"><button id="m-confall">Confirm all</button><button id="m-dismall">Dismiss all</button></span></div>';
  MF.forEach(function(f,fi){
   var k=mkey(f),st=mstate(c.id,k);
   var fieldNice=f.field.replace(":"," #").replace("links.","link · ");
   h+='<div class="mrow '+st+'" data-mf="'+fi+'"><div class="mlbl"><span class="mk">'+esc(fieldNice)+'</span><span class="mi">'+esc(f.issue)+'</span><span class="mr">'+esc(f.reason||"")+'</span></div><button class="mbtn cf" data-act="confirm">'+(st==="confirmed"?"&#10003; Confirmed":"&#10003; Confirm")+'</button><button class="mbtn ds" data-act="dismiss">'+(st==="dismissed"?"&times; Dismissed":"&times; Dismiss")+'</button></div>';
  });
  h+='</div>';
 }
 // links
 h+='<div class="lbl">Official links</div>';
 var L=x.links||{};
 function linkRow(name,field,url){return '<div class="lk"><span class="nm">'+name+'</span>'+(url?'<a href="'+esc(url)+'" target="_blank" rel="noopener">'+esc(url)+'</a>'+chip(field,"dead",c.id)+chip(field,"wrong",c.id):'<span class="miss">none</span>'+chip(field,"missing",c.id))+'</div>';}
 h+=linkRow("Website","links.website",L.website);
 h+=linkRow("YouTube","links.youtube",L.youtube);
 h+=linkRow("Instagram","links.instagram",L.instagram);
 h+=linkRow("Podcast","links.podcast",L.podcast&&L.podcast.url);
 // specials
 var sps=x.specials||[];
 h+='<div class="lbl">Specials ('+sps.length+')</div>';
 if(!sps.length)h+='<div class="flags">'+chip("specials","none / add",c.id)+'</div>';
 sps.forEach(function(s,si){var f="special:"+si;var pos=s.poster?'<img src="https://image.tmdb.org/t/p/w185/'+esc(s.poster)+'" alt="">':'<div class="none">'+esc((s.t||"?")[0])+'</div>';
  h+='<div class="card"><div class="row"><div class="pos">'+pos+'</div><div style="flex:1"><div class="t">'+esc(s.t)+'</div><div class="m">'+esc(s.yr||"")+' &middot; '+esc(s.plat||"")+(s.watch?' &middot; <a class="w" href="'+esc(s.watch)+'" target="_blank" rel="noopener">watch</a>':' &middot; no watch link')+'</div><div class="flags">'+chip(f,"wrong special",c.id)+chip(f,"wrong/no poster",c.id)+chip(f,"wrong year",c.id)+chip(f,"add watch",c.id)+chip(f,"remove",c.id)+'</div></div></div></div>';});
 // bits
 var bits=x.bits||[];
 h+='<div class="lbl">Bits ('+bits.length+') &mdash; play to confirm the clip matches</div>';
 if(!bits.length)h+='<div class="flags">'+chip("bits","none / add",c.id)+chip("bits","needs more",c.id)+'</div>';
 bits.forEach(function(b,bi){var f="bit:"+bi;var src=(b.src||"youtube");var pid=src==="instagram"?(b.shortcode||""):esc(b.id);var srcTag=src==="instagram"?' <span class="pill" style="background:#fff;border:2px solid var(--ink);padding:2px 8px;font-size:10px;letter-spacing:.06em">IG</span>':'';
  h+='<div class="card"><div class="row"><button class="pb" data-play="'+esc(pid)+'" data-src="'+esc(src)+'" data-t="'+esc(b.t)+'">&#9654; Play</button><div style="flex:1"><div class="t">'+esc(b.t)+srcTag+'</div><div class="m">'+esc(b.subj||"")+' &middot; from '+esc(b.sp||"?")+' '+esc(b.yr||"")+' &middot; '+(src==="instagram"?'IG reel '+esc(pid):'id '+esc(pid))+'</div><div class="flags">'+chip(f,"wrong clip",c.id)+chip(f,"wrong title",c.id)+chip(f,"not official",c.id)+chip(f,"wrong type",c.id)+chip(f,"remove",c.id)+'</div></div></div><div class="embed" data-slot="'+bi+'"></div></div>';});
 if(bits.length)h+='<div class="flags" style="margin-top:6px">'+chip("bits","needs more",c.id)+'</div>';
 // note
 h+='<div class="lbl">Note (optional)</div><textarea class="note" id="note" placeholder="Anything else to fix for '+esc(c.name)+'…">'+esc(rec(c.id).note||"")+'</textarea>';
 app.innerHTML=h;
 app.querySelectorAll(".fl").forEach(function(el){el.addEventListener("click",function(){toggleFlag(curId,el.dataset.field,el.dataset.issue);el.classList.toggle("on");refreshStatusChip();});});
 // machine flag handlers
 function reRenderMF(){load(i);} // simplest correct path: re-render the comic
 app.querySelectorAll(".mrow").forEach(function(row){
  var fi=parseInt(row.dataset.mf,10);var f=MF[fi];var k=mkey(f);
  row.querySelector('[data-act="confirm"]').addEventListener("click",function(){
   var st=mstate(curId,k);
   if(st==="confirmed"){msetState(curId,k,"pending");removeFlag(curId,f.field,f.issue);}
   else{msetState(curId,k,"confirmed");addFlag(curId,f.field,f.issue);}
   refreshStatusChip();reRenderMF();
  });
  row.querySelector('[data-act="dismiss"]').addEventListener("click",function(){
   var st=mstate(curId,k);
   if(st==="dismissed"){msetState(curId,k,"pending");}
   else{msetState(curId,k,"dismissed");if(st==="confirmed")removeFlag(curId,f.field,f.issue);}
   refreshStatusChip();reRenderMF();
  });
 });
 var ca=document.getElementById("m-confall");if(ca)ca.addEventListener("click",function(){MF.forEach(function(f){if(mstate(curId,mkey(f))!=="dismissed"){msetState(curId,mkey(f),"confirmed");addFlag(curId,f.field,f.issue);}});refreshStatusChip();reRenderMF();});
 var da=document.getElementById("m-dismall");if(da)da.addEventListener("click",function(){if(!confirm("Dismiss all machine flags for "+esc(c.name)+"? This will also remove any you previously confirmed."))return;MF.forEach(function(f){var st=mstate(curId,mkey(f));if(st==="confirmed")removeFlag(curId,f.field,f.issue);msetState(curId,mkey(f),"dismissed");});refreshStatusChip();reRenderMF();});
 app.querySelectorAll("[data-play]").forEach(function(btn){btn.addEventListener("click",function(){var slot=btn.closest(".card").querySelector(".embed");if(slot.innerHTML){slot.innerHTML="";btn.innerHTML="&#9654; Play";return;}var src=btn.dataset.src||"youtube";var pid=btn.dataset.play;if(src==="instagram"){slot.innerHTML='<iframe src="https://www.instagram.com/reel/'+pid+'/embed/" style="border:0;width:100%;max-width:420px;aspect-ratio:9/16;border-radius:8px" allowfullscreen></iframe>';}else{slot.innerHTML='<iframe src="https://www.youtube.com/embed/'+pid+'?rel=0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>';}btn.innerHTML="&#9632; Close";});});
 var nt=document.getElementById("note");if(nt)nt.addEventListener("input",function(){var r=rec(curId);r.note=nt.value;if(r.note&&r.status==="unseen")r.status="issues";save();});
 updateProg();
}
function refreshStatusChip(){var el=document.querySelector(".status");if(el){var s=statusOf(curId);el.className="status "+s;el.textContent=s;}}
function verifyNext(){var r=rec(curId);r.status=(r.flags.length||r.note)?"issues":"verified";r.ts=Date.now();save();nextUnaudited(true);}
function nextUnaudited(fromVerify){for(var k=1;k<=ROST.length;k++){var j=(i+k)%ROST.length;if(statusOf(ROST[j].id)==="unseen"){load(j);return;}}load((i+1)%ROST.length);}
document.getElementById("prev").addEventListener("click",function(){load(i-1);});
document.getElementById("next").addEventListener("click",function(){load(i+1);});
document.getElementById("verify").addEventListener("click",verifyNext);
document.getElementById("jump").addEventListener("click",function(){nextUnaudited();});
document.getElementById("export").addEventListener("click",function(){
 // any comic with AUD activity OR an MD disposition is exported
 var ids={};Object.keys(AUD).forEach(function(id){if(AUD[id].flags.length||AUD[id].note||AUD[id].status==="verified")ids[id]=1;});Object.keys(MD).forEach(function(id){if(Object.keys(MD[id]||{}).length)ids[id]=1;});
 var out={generated:new Date().toISOString(),audited:ROST.filter(function(c){return statusOf(c.id)!=="unseen";}).length,total:ROST.length,
  comics:Object.keys(ids).map(function(id){var a=AUD[id]||{status:"unseen",flags:[],note:""};return {id:id,status:a.status,flags:a.flags||[],note:a.note||"",machine_dispositions:MD[id]||{}};})};
 var js=JSON.stringify(out,null,1);
 try{navigator.clipboard.writeText(js);}catch(e){}
 var blob=new Blob([js],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gb-audit.json";a.click();
 alert("Audit exported: "+out.comics.length+" comics with flags/verdicts. Copied to clipboard + downloaded gb-audit.json.");
});
document.addEventListener("keydown",function(e){if(/^(INPUT|TEXTAREA)$/.test((document.activeElement||{}).tagName||""))return;
 if(document.getElementById("rankview").style.display==="block")return;
 if(e.key==="ArrowLeft"){load(i-1);}else if(e.key==="ArrowRight"){load(i+1);}else if(e.key==="v"||e.key==="V"){verifyNext();}else if(e.key==="n"||e.key==="N"){nextUnaudited();}});
(async function(){
 try{var r=await fetch("data/comedians.json?v="+Date.now());ROST=await r.json();}catch(e){document.getElementById("app").innerHTML='<div class="empty">Could not load roster.</div>';return;}
 ROST.sort(function(a,b){return (a.name||"").localeCompare(b.name||"");});
 var firstUn=ROST.findIndex(function(c){return statusOf(c.id)==="unseen";});
 load(firstUn>-1?firstUn:0);
})();
</script>

<script>/*GBRANK*/
(function(){
var RKEY="gbRank_v1";
var POOL=["richard-pryor","george-carlin","lenny-bruce","louis-ck","chris-rock","joan-rivers","jerry-seinfeld","bill-cosby","dave-chappelle","mort-sahl","steve-martin","robin-williams","bill-hicks","andy-kaufman","steven-wright","billy-connolly","bill-burr","kevin-hart","albert-brooks","mitch-hedberg","bob-newhart","jonathan-winters","don-rickles","eddie-izzard","eddie-murphy","rodney-dangerfield","redd-foxx","robert-klein","dick-gregory","sarah-silverman","patrice-oneal","janeane-garofalo","patton-oswalt","tig-notaro","sam-kinison","roseanne-barr","moms-mabley","garry-shandling","bernie-mac","phyllis-diller","russell-peters","freddie-prinze","reggie-watts","elayne-boosler","margaret-cho","aziz-ansari","wanda-sykes","norm-macdonald","maria-bamford","john-mulaney","bo-burnham","hannah-gadsby","ali-wong","brian-regan","jim-gaffigan","anthony-jeselnik","marc-maron","hannibal-buress","demetri-martin","dave-attell","greg-giraldo","ron-white","katt-williams","sebastian-maniscalco","nate-bargatze","mike-birbiglia","gary-gulman","doug-stanhope","todd-barry","pete-holmes","tom-segura","bert-kreischer","theo-von","taylor-tomlinson","nikki-glaser","iliza-shlesinger","shane-gillis","mark-normand","matt-rife","stavros-halkias","hasan-minhaj","gabriel-iglesias","george-lopez","jeff-foxworthy","jim-jefferies","daniel-tosh","kathy-griffin"];
var RST=null;
function byId(id){for(var k=0;k<ROST.length;k++)if(ROST[k].id===id)return ROST[k];return null;}
function nm(id){var c=byId(id);return c?c.name:id;}
function face(id,cls){cls=cls||"rk-face";var c=byId(id);var p=c&&c.photo_url;return p?'<img class="'+cls+'" src="'+esc(p)+'" alt="">':'<div class="'+cls+'"><span class="ini">'+esc((nm(id)||"?").slice(0,2).toUpperCase())+'</span></div>';}
function loadRS(){
 try{RST=JSON.parse(localStorage.getItem(RKEY));}catch(e){RST=null;}
 if(!RST||!RST.queue){RST={ranked:[],queue:POOL.slice(),pending:null,lo:0,hi:0,cmp:0};}
 // reconcile with current POOL: drop removed ids, append new ones to the queue
 RST.ranked=(RST.ranked||[]).filter(function(id){return POOL.indexOf(id)>-1;});
 RST.queue=(RST.queue||[]).filter(function(id){return POOL.indexOf(id)>-1;});
 if(RST.pending&&POOL.indexOf(RST.pending)<0)RST.pending=null;
 var have={};RST.ranked.forEach(function(id){have[id]=1;});RST.queue.forEach(function(id){have[id]=1;});if(RST.pending)have[RST.pending]=1;
 POOL.forEach(function(id){if(!have[id])RST.queue.push(id);});
 if(typeof RST.cmp!=="number")RST.cmp=0;
}
function saveRS(){localStorage.setItem(RKEY,JSON.stringify(RST));}
function step(){
 if(!RST.pending){
  if(!RST.queue.length){return renderDone();}
  RST.pending=RST.queue.shift();RST.lo=0;RST.hi=RST.ranked.length;
  if(RST.ranked.length===0){RST.ranked.push(RST.pending);RST.pending=null;saveRS();return step();}
 }
 if(RST.lo>=RST.hi){RST.ranked.splice(RST.lo,0,RST.pending);RST.pending=null;saveRS();return step();}
 renderPair();
}
function pick(pendingWins){
 var mid=(RST.lo+RST.hi)>>1;
 if(pendingWins){RST.hi=mid;}else{RST.lo=mid+1;}
 RST.cmp++;
 if(RST.lo>=RST.hi){RST.ranked.splice(RST.lo,0,RST.pending);RST.pending=null;}
 saveRS();step();
}
function renderPair(){
 var mid=(RST.lo+RST.hi)>>1,A=RST.pending,B=RST.ranked[mid];
 var v=document.getElementById("rankview");
 v.innerHTML='<div class="rk-sub">Placed '+RST.ranked.length+' / '+POOL.length+' &middot; comparison #'+(RST.cmp+1)+'</div>'
  +'<div class="rk-head">Who ranks higher?</div>'
  +'<div class="rk-q">Click the comic you rate higher all-time. Each pick slots the challenger into your list; you can stop and resume anytime.</div>'
  +'<div class="rk-stage"><div class="rk-card" data-w="A">'+face(A)+'<div class="rk-nm">'+esc(nm(A))+'</div></div>'
  +'<div class="rk-or">OR</div>'
  +'<div class="rk-card" data-w="B">'+face(B)+'<div class="rk-nm">'+esc(nm(B))+'</div></div></div>'
  +'<div class="rk-tools"><button id="rk-export">Export ranking so far</button><button id="rk-restart">Restart</button><button id="rk-exit">Back to audit</button></div>';
 v.querySelector('[data-w="A"]').addEventListener("click",function(){pick(true);});
 v.querySelector('[data-w="B"]').addEventListener("click",function(){pick(false);});
 wireTools();
}
function renderDone(){
 var v=document.getElementById("rankview");
 v.innerHTML='<div class="rk-sub">Ranking complete &middot; '+RST.ranked.length+' comics &middot; '+RST.cmp+' comparisons</div>'
  +'<div class="rk-head">Your ranking</div>'
  +'<div class="rk-q">This is your pairwise verdict vs the seeded order. Export to send me the deltas and I will reseat the Best Comics list.</div>'
  +'<ol class="rk-final">'+RST.ranked.map(function(id,k){
     var seed=POOL.indexOf(id)+1,d=seed-(k+1);
     var delta=d===0?'<span class="rk-eq">&middot;</span>':(d>0?'<span class="rk-up">&#9650;'+d+'</span>':'<span class="rk-dn">&#9660;'+(-d)+'</span>');
     return '<li><span class="rk-r">'+(k+1)+'</span>'+face(id,"rk-mini")+'<span class="rk-fn">'+esc(nm(id))+'</span><span class="rk-seed">seed #'+seed+'</span>'+delta+'</li>';
    }).join("")+'</ol>'
  +'<div class="rk-tools"><button id="rk-export" class="exp">Export ranking</button><button id="rk-restart">Restart</button><button id="rk-exit">Back to audit</button></div>';
 wireTools();
}
function exportRank(){
 var ranking=RST.ranked.map(function(id,k){return {rank:k+1,id:id,name:nm(id),seed:POOL.indexOf(id)+1};});
 var out={generated:new Date().toISOString(),complete:(!RST.pending&&!RST.queue.length),placed:RST.ranked.length,total:POOL.length,comparisons:RST.cmp,ranking:ranking};
 var js=JSON.stringify(out,null,1);
 try{navigator.clipboard.writeText(js);}catch(e){}
 var blob=new Blob([js],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gb-comic-ranking.json";a.click();
 alert("Ranking exported: "+ranking.length+" placed of "+POOL.length+(out.complete?" (complete)":" (in progress)")+". Copied to clipboard + downloaded gb-comic-ranking.json.");
}
function wireTools(){
 var ex=document.getElementById("rk-export");if(ex)ex.addEventListener("click",exportRank);
 var rs=document.getElementById("rk-restart");if(rs)rs.addEventListener("click",function(){if(confirm("Restart ranking from scratch? This clears your current pairwise progress.")){localStorage.removeItem(RKEY);loadRS();step();}});
 var xt=document.getElementById("rk-exit");if(xt)xt.addEventListener("click",gbStopRank);
}
function gbStartRank(){document.getElementById("app").style.display="none";document.querySelector(".ctrl").style.display="none";document.getElementById("rankview").style.display="block";loadRS();step();window.scrollTo(0,0);}
function gbStopRank(){document.getElementById("rankview").style.display="none";document.getElementById("app").style.display="block";document.querySelector(".ctrl").style.display="flex";updateProg();}
document.getElementById("mode-rank").addEventListener("click",function(){
 if(document.getElementById("rankview").style.display==="block"){gbStopRank();}else{gbStartRank();}
});
})();
</script>
</body>
