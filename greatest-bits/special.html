<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting — Greatest Bits</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://yellinmatt.github.io/greatest-bits/browse.html">
<style>
body{margin:0;background:#fff3e4;color:#0d0d0d;font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:grid;place-items:center;min-height:100vh}
.box{max-width:520px;padding:40px;text-align:center}
h1{font-family:Anton,sans-serif;font-size:32px;margin:0 0 10px;text-transform:uppercase}
p{font-size:14px;color:#8a7a64;margin:6px 0}
a{color:#e8341c;text-decoration:underline}
</style>
</head>
<body>
<div class="box">
  <h1>Redirecting&hellip;</h1>
  <p>Taking you to the comic's page.</p>
  <p>If you aren't redirected, <a href="browse.html">browse The Index</a>.</p>
</div>
<script>
// Bounce special.html?s=<slug> to comic.html?c=<comicId>#sp-<slug>.
// Old shared links keep working; new traffic skips this page entirely
// (specials.html, browse search, and comic.html no longer point here).
(async function(){
  var slug = new URLSearchParams(location.search).get("s") || "";
  if(!slug){ location.replace("browse.html"); return; }
  try{
    var r = await fetch("data/specials.json?v="+Date.now());
    var idx = await r.json();
    var s = idx[slug];
    if(s && s.comicId){
      location.replace("comic.html?c=" + encodeURIComponent(s.comicId) + "#sp-" + encodeURIComponent(slug));
      return;
    }
  }catch(e){}
  // Fallback if specials.json missing or slug not found: send to The Index
  location.replace("browse.html");
})();
</script>
</body>
</html>
