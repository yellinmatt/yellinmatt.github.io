<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7f4ee" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14181d" media="(prefers-color-scheme: dark)">
<title>Matthew Yellin</title>
<meta name="description" content="Two daily publications by Matthew Yellin: The Yellin Brief and Well-Versed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light dark;--ink:#1f2933;--muted:#6f7680;--accent:#1f4e79;--rule:#ddd7c9;--soft:#efeae0;--bg:#f7f4ee;--serif:'Spectral',Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
@media (prefers-color-scheme:dark){:root{--ink:#e9e7de;--muted:#8a8f96;--accent:#6fa8d6;--rule:#2a2f36;--soft:#1c2128;--bg:#14181d}}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--serif);-webkit-font-smoothing:antialiased}
.wrap{max-width:620px;margin:0 auto;padding:max(64px,12vh) 28px 80px;min-height:100vh;min-height:100dvh}
.head{text-align:center;border-top:2px solid var(--accent);padding-top:24px;margin-bottom:8px}
.head h1{font-size:46px;font-weight:500;letter-spacing:-0.02em;margin:0;line-height:1}
.head .sub{font-family:var(--sans);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:12px}
.cards{margin-top:40px;display:grid;gap:16px}
.pub{display:block;text-decoration:none;color:inherit;background:var(--soft);border:0.5px solid var(--rule);border-radius:8px;padding:24px 26px;transition:border-color 0.15s}
.pub:hover{border-color:var(--accent)}
.pub .name{font-size:30px;font-weight:500;letter-spacing:-0.015em;line-height:1;margin:0}
.pub .tag{font-style:italic;font-size:15.5px;color:var(--muted);margin:10px 0 0;line-height:1.5}
.pub .enter{font-family:var(--sans);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-top:14px;display:inline-block}
.foot{margin-top:48px;padding-top:20px;border-top:0.5px solid var(--rule);text-align:center;font-size:12px;font-style:italic;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header class="head">
    <h1>Matthew Yellin</h1>
    <div class="sub">Two daily publications</div>
  </header>
  <div class="cards">
    <a class="pub" href="news/">
      <p class="name">The Yellin Brief</p>
      <p class="tag">A daily world brief, lens-scored for capital markets and entertainment law.</p>
      <span class="enter">Read today &rarr;</span>
    </a>
    <a class="pub" href="well-versed/">
      <p class="name">Well-Versed</p>
      <p class="tag">A general education, one concept a day toward a well-rounded mind.</p>
      <span class="enter">Today&rsquo;s lesson &rarr;</span>
    </a>
  </div>
  <div class="foot">Compiled by Matthew Yellin &middot; Est. May 2026</div>
</div>
</body>
</html>
