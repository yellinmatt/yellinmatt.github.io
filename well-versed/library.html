<script>
var LESSONS=[
{no:"064",t:"Alan Turing",sub:"Technology",f:"Technology",k:"In 1936, chasing an abstract problem in logic, a twenty-four-year-old Cambridge mathematician imagined a machine that read and wrote symbols on an endless tape and, fed a description of any other machine, could imitate it perfectly. That universal machine is the design every computer has followed since. Turing meant only to answer Hilbert's decision problem, and his answer was no, some questions no rote procedure can settle; the general-purpose computer fell out as a by-product, alongside the Church-Turing thesis. In the war he joined Bletchley Park and, with Gordon Welchman, designed the Bombe that mechanized the breaking of Enigma. In 1950 he asked whether a machine could think and proposed the imitation game we now call the Turing test. Convicted of gross indecency in 1952 and chemically castrated, he died in 1954 aged forty-one; Britain pardoned him in 2013 and put him on the fifty-pound note in 2021.",dt:"10 July 2026",h:"alan-turing.html",img:"Alan_Turing_(1951).jpg"},
{no:"063",t:"The Calling Card",sub:"Etiquette",f:"Social Living",k:"For a century and a half a small rectangle of pasteboard ran the social life of the upper classes. The calling card came out of France in the 1760s, printed and left at a house to announce a visit; the answer came back as a card of one's own, or as silence. Its grammar was strict: a card returned meant a visit would be welcome, one sent sealed in an envelope closed the door, and the whole system leaned on servants to carry the cards on a silver tray. A turned corner meant it was left in person, though the elaborate code of the corners was always looser than legend. Emily Post was still explaining it in 1922, as the automobile and telephone finished it off. Its heirs are the business card and the RSVP.",dt:"9 July 2026",h:"calling-card.html",img:"Francesco_Bartolozzi_-_Visiting_Card_of_Mrs_Parker_-_B1978.43.697_-_Yale_Center_for_British_Art.jpg"},
{no:"062",t:"The Hippocratic Oath",sub:"Medicine",f:"Medicine & the Body",k:"The oldest and best-known text in medical ethics, set down on Kos in the fifth or fourth century BC and almost certainly written by the followers of Hippocrates rather than the man himself. It swears the physician by Apollo, Asclepius, Hygieia, and Panacea, binds him to his teacher's family like a son, and forbids specific acts: no lethal drug, no abortive pessary, no cutting for the stone, no exploiting the household, and strict confidentiality. Its most famous line, first do no harm, appears nowhere in it; that Latin maxim traces to the nineteenth century. Most schools now use a modern rewrite, Louis Lasagna's of 1964.",dt:"8 July 2026",h:"hippocratic-oath.html",img:"Hippocrates_pushkin02.jpg"},
{no:"061",t:"The Bowline",sub:"Practical Skills",f:"Practical Skills",k:"The one knot to learn if you learn only one. The bowline makes a fixed loop at the end of a line that holds under any strain the rope will bear, refuses to jam so it unties with a finger even after a heavy load, and can be tied with one hand, which is why it belongs to rescue crews. Its name comes from the age of sail; its first mention in print is John Smith's A Sea Grammar of 1627; Clifford Ashley listed it as number 1010 and called it a knot a sailor seldom trades for another. Learn it by the rabbit, the hole, and the tree.",dt:"7 July 2026",h:"bowline.html",img:"Palstek_innen.jpg"},
{no:"060",t:"The Marshall Plan",sub:"Diplomacy",f:"Civic & Money",k:"How a soldier's understated ten-minute speech at Harvard in June 1947 became the largest peacetime aid program in history. George Marshall offered American money on the condition that Europe draw up the plan together; roughly thirteen billion dollars flowed to sixteen nations from 1948 to 1952; every recipient's output climbed back above its prewar level; the Soviet walkout in Paris split the continent into two blocs; and Marshall became the only career soldier ever to win the Nobel Peace Prize.",dt:"7 July 2026",h:"marshall-plan.html",img:"George_C._Marshall,_U.S._Secretary_of_State.jpg"},
 {no:"059",t:"Ethos, Pathos, Logos",sub:"Rhetoric",f:"Language & Rhetoric",k:"The Athenian art of persuasion, sorted by Aristotle into three appeals, ethos, pathos, and logos, and shown at work in the most studied speech of the American century.",dt:"6 July 2026",h:"ethos-pathos-logos.html",img:"Aristotle_Altemps_Inv8575.jpg"},
 {no:"058",t:"Beethoven's Ninth Symphony",sub:"Music",f:"Music",k:"How a stone-deaf composer wrote the first symphony to break into song, sang Schiller's Ode to Joy in its finale, and gave the world a melody that became the anthem of a continent.",dt:"5 July 2026",h:"beethovens-ninth-symphony.html",img:"Joseph_Karl_Stieler%27s_Beethoven_mit_dem_Manuskript_der_Missa_solemnis.jpg"},
 {no:"057",t:"The Wolf",sub:"Wildlife",f:"The Animal World",k:"A predator erased from Yellowstone for seventy years and carried back in a crate: how the wolf returned, why the &ldquo;alpha wolf&rdquo; never existed in the wild, and what a top predator really does.",dt:"4 July 2026",h:"wolf.html",img:"Gray_Wolf_-_Canis_lupus_(51545668593).jpg"},
 {no:"056",t:"The Moneymaker Effect",sub:"Poker",f:"Games & Pastimes",k:"An accountant with no live-tournament experience turned an $86 online satellite into $2.5 million and the biggest boom poker has ever seen.",dt:"3 July 2026",h:"moneymaker-effect.html",img:"Chris_Moneymaker.jpg"},
 {no:"055",t:"Beef Bourguignon",sub:"Food",f:"Food",k:"America learned to cook French from this one Burgundian braise, a lesson in what long, low heat and a bottle of red do to a cheap cut of beef.",dt:"2 July 2026",h:"beef-bourguignon.html",img:"Boeuf%20Bourguignon%202022.jpg"},
 {no:"054",t:"The Necktie",sub:"Objects & Style",f:"Objects & Style",k:"The one garment a man wears purely to be looked at, from a Croatian soldier's neckcloth to Jesse Langsdorf's 1922 bias cut.",dt:"1 July 2026",h:"necktie.html",img:"Necktie%20MET%201985.367.11.jpg"},
 {no:"053",t:"Fermat's Last Theorem",sub:"Mathematics",f:"Sciences & Mathematics",k:"A lawyer's margin note in 1637 that took the world three hundred and fifty-eight years, and Andrew Wiles seven secret ones, to prove.",dt:"1 July 2026",h:"fermats-last-theorem.html",img:"Pierre_de_Fermat2.png"},
 {no:"052",t:"The Four-Minute Mile",sub:"Athletics",f:"Sports",k:"On 6 May 1954, on the Iffley Road track in Oxford, the medical student Roger Bannister became the first man to run a mile in under four minutes, a figure physiologists had treated as a wall the body could not pass. The gale that almost cancelled the attempt; the two pacemaker friends, Chris Brasher and Chris Chataway, who set the pace through 1:58 at the half and 3:00.7 at three-quarters before Bannister surged past on the back straight; the 3:59.4, and the statistician Norris McWhirter (later of the Guinness Book of Records) drawing the announcement out until the crowd's roar drowned it; Bannister the twenty-five-year-old who trained on his lunch breaks and read the barrier as much mental as physical; the record falling to John Landy in just forty-six days; the Miracle Mile at Vancouver that August where both men broke four minutes in one race; and the afterlife, Bannister the neurologist and the mile now down to El Guerrouj's 3:43.13.",dt:"30 June 2026",h:"four-minute-mile.html",img:"Roger_Bannister_1953.jpg"},
 {no:"051",t:"The Peregrine Falcon",sub:"Birding",f:"The Animal World",k:"The peregrine falcon, the fastest animal alive and one of conservation's great comebacks: the hunting stoop, a near-vertical dive in which the bird folds its wings and drops at a speed Cornell puts near 238 miles an hour, killing prey on the wing with a single open-footed blow before biting through the neck; a diet of other birds, some 450 species in North America from hummingbird to sandhill crane; the field marks (slate-gray back, barred underparts, the dark moustache mark, the larger female 'falcon' and smaller male 'tiercel'); the name meaning pilgrim or wanderer and a range covering every continent but Antarctica; the mid-century DDT crash that thinned its eggshells and wiped it out east of the Mississippi (a centerpiece of Rachel Carson's Silent Spring); and the recovery led by Tom Cade and the Peregrine Fund from 1970, the 1972 DDT ban, the move into cities, and removal from the U.S. endangered-species list in 1999.",dt:"29 June 2026",h:"peregrine-falcon.html",img:"Falco_peregrinus_good_-_Christopher_Watson.jpg"},
 {no:"050",t:"The Tobacco Pipe",sub:"Smoke",f:"Smoke",k:"How to know and smoke a pipe: briar, the root burl of the Mediterranean tree heath Erica arborea, which since around 1854 at Saint-Claude displaced the fragile clay pipe because it shrugs off heat and chars sweet; the four working parts (bowl and its chamber, the draught hole, the shank, the stem ending in the bit); the other materials (meerschaum, the soft Turkish sepiolite that colours amber with use; clay; and the corncob General MacArthur made his trademark); the Sherlock Holmes calabash that Conan Doyle never wrote, invented for the stage by the actor William Gillette; the four base leaves (sweet Virginia, nutty Burley, smoky Latakia, peppery Perique) and the English-versus-aromatic divide; and how to pack (child, woman, man), light twice, and sip slow so it stays cool.",dt:"28 June 2026",h:"tobacco-pipe.html",img:"Briar_pipe_Lord.jpg"},
 {no:"049",t:"Magna Carta",sub:"Medieval England",f:"History",k:"The 1215 Magna Carta, walked from Runnymede to the modern bill of rights: King John cornered by his rebel barons after losing Normandy and quarreling with Rome; the sixty-three clauses of mostly feudal grievance sealed on 15 June 1215; clauses 39 and 40 on due process and the sale of justice; Pope Innocent III annulling the whole charter within weeks and the First Barons' War that followed; the reissues under Henry III and the 1297 confirmation onto the statute roll; and the long afterlife from Sir Edward Coke to the Fifth Amendment's due process and Eleanor Roosevelt's 'Magna Carta for all mankind', with three clauses still in force today.",dt:"27 June 2026",h:"magna-carta.html",img:"Magna_Carta_(British_Library_Cotton_MS_Augustus_II.106).jpg"},
 {no:"048",t:"The Wet Shave",sub:"Practical Skills",f:"Practical Skills",k:"The traditional wet shave with a double-edged safety razor: the three-piece kit (razor, brush, soap or cream); the history that corrects a common myth, since King Camp Gillette did not invent the safety razor (the straight razor came first, Jean-Jacques Perret fitted a guard around 1770, and the Kampfe brothers of New York sold the first tool called a 'safety razor' in 1880) but in 1904 patented the cheap, thin throwaway blade that made his fortune through the razor-and-blades model and spread further when the U.S. Army issued Gillette kits in the First World War; why the brush and lather matter (they soften and lift the whiskers and slick the blade); the two counter-intuitive habits (hold the blade at about thirty degrees and use no pressure beyond the razor's own weight); and the three-pass method, with, across, and against the grain.",dt:"26 June 2026",h:"wet-shave.html",img:"Rasierpinsel.jpg"},
 {no:"047",t:"Cogito, Ergo Sum",sub:"Philosophy",f:"Philosophy & Religion",k:"Descartes' search for a single belief that could not be doubted, and the answer he built a philosophy on: I think, therefore I am. To find what could be known for certain, he resolved to treat as false anything open to the least doubt. The senses deceive, so he set them aside; dreams feel as real as waking, so he set the waking world aside; and in the Meditations of 1641 he imagined an all-powerful evil demon deceiving him about everything, even arithmetic. One thing survived the doubt: to be deceived at all, he had to exist to be deceived, and doubting is itself a kind of thinking, so a thinker must exist. He first wrote the line in French, 'je pense, donc je suis', in the Discourse on the Method of 1637; the Latin 'Cogito, ergo sum' reached print in the Principles of Philosophy of 1644; and in the Meditations he phrases it as 'I am, I exist', necessarily true each time he conceives it. From this single certainty he set out to rebuild the world, reasoning out through a non-deceiving God to the trustworthiness of clear and distinct ideas, a move critics still attack as the Cartesian circle. The cogito also founded Cartesian dualism, which splits mind from body and opens the modern mind-body problem. Descartes died in 1650 of pneumonia in Stockholm after Queen Christina demanded her lessons at five in the morning; he is called the father of modern philosophy for moving the starting point of knowledge from God and authority to the doubting individual self.",dt:"25 June 2026",h:"cogito-ergo-sum.html",img:"Frans_Hals_-_Portret_van_Ren%C3%A9_Descartes.jpg"},
 {no:"046",t:"Carmen",sub:"Opera",f:"Film & Performing Arts",k:"The opera that scandalized Paris at its 1875 premiere and went on to become one of the most performed works in the world. On 3 March 1875 the Opéra-Comique, a Paris house known for light, well-mannered entertainment that ended with order restored, watched a soldier knife a cigarette-factory worker to death on the steps of a bullring; the woman was Carmen, a Romani factory girl who took her lovers as she pleased and went to her death without repentance, and the first audiences were scandalized. Georges Bizet built the opera from Prosper Mérimée's hard 1845 novella, with a libretto by Henri Meilhac and Ludovic Halévy, setting in Seville the corporal Don José who throws away his rank and his fiancée Micaëla for Carmen, and the toreador Escamillo who supplants him. An opéra-comique meant a French opera mixing sung numbers with spoken dialogue, not necessarily a comedy. The first run played to half-empty houses even after free tickets, sharing the season with Verdi's more popular Requiem, and the critics called it obscene. Yet Bizet had buried two melodies the whole world now knows: the Habanera, 'L'amour est un oiseau rebelle', Carmen's entrance aria over a slowly descending bass, lifted from Sebastián Iradier's song 'El Arreglito' in the belief it was folk music and rewritten about a dozen times for the original Carmen, mezzo-soprano Célestine Galli-Marié; and the Toreador's Song. Bizet died of a heart attack on 3 June 1875, at thirty-six, during the opera's thirty-third performance, still believing it a failure. Within a decade it was a worldwide staple; Tchaikovsky predicted it would be the most popular opera in the world, and Nietzsche worshipped it as the sunlit, Mediterranean cure for Wagner.",dt:"24 June 2026",h:"carmen.html",img:"Henri-Lucien%20Doucet%20-%20Carmen.jpg"},
 {no:"045",t:"ARPANET",sub:"Technology",f:"Technology",k:"The network that became the internet, walked from its first stuttered message to the design choices that still govern the web. On the night of 29 October 1969 a UCLA graduate student, Charley Kline, tried to log in to a computer at the Stanford Research Institute over the new ARPANET and the link crashed after two letters, making the first message ever sent between two computers the accidental word 'lo'. ARPANET was funded by the Pentagon's Advanced Research Projects Agency to let rare, incompatible, expensive computers share work across distance, a vision J.C.R. Licklider had sketched as an 'Intergalactic Computer Network' and Lawrence Roberts turned into a plan. Its breakthrough was packet switching, worked out independently by Paul Baran at RAND and Donald Davies at Britain's NPL with the supporting mathematics from Leonard Kleinrock: every message is broken into small addressed packets that route across the network independently and reassemble at the far end, so a downed line is simply routed around. Bolt Beranek and Newman built the Interface Message Processor, the refrigerator-sized gateway that sat at each node; four were running by the end of 1969, linking UCLA, SRI, UC Santa Barbara, and Utah. Email arrived in 1971 (Ray Tomlinson, who chose the @ sign) and soon dominated the traffic; Vint Cerf and Bob Kahn's TCP/IP, adopted in a coordinated 'flag day' cutover on 1 January 1983, turned a single network into the internet. ARPANET itself was retired in 1990.",dt:"23 June 2026",h:"arpanet.html",img:"Interface_Message_Processor_Front_Panel.jpg"},
 {no:"044",t:"The Handshake",sub:"Etiquette",f:"Social Living",k:"The gesture old enough to seal an Assyrian treaty and tender enough to mark a Greek goodbye. The oldest known image of a handshake is an Assyrian relief of the ninth century BC, where King Shalmaneser III of Assyria and Marduk-zakir-shumi of Babylon clasp right hands to seal an alliance; why the right hand became the hand of greeting is guessed at more than known, between the theory that an open right hand shows no weapon and the theory that two clasped hands make a promise physical. The Greeks named it dexiosis, the giving of the right hand, and by the fifth century BC made it a fixed motif, dominant after about 430 BC on Athenian grave reliefs where a seated and a standing figure clasp hands across the line between living and dead, the same gesture serving greeting, marriage, alliance, and the last farewell. Rome kept it (the dextrarum iunctio at the heart of a wedding, two joined hands on a coin of Concordia), and seventeenth-century Quakers turned it into a leveling courtesy offered to everyone regardless of rank. The craft still comes down to a few seconds: the Emily Post Institute's drill is doorknob pressure, crook of thumb to crook of thumb, two or three pumps, a held eye, and a dry hand, against the two notorious failures of the limp hand and the knuckle-grinder. A 2015 Weizmann Institute study even found people often sniff a just-shaken hand, suggesting the handshake quietly samples a stranger's chemistry.",dt:"22 June 2026",h:"handshake.html",img:"Funerary_stele_of_Thraseas_and_Euandria_Antikensammlung_Berlin_01.jpg"},
 {no:"043",t:"The Jab",sub:"Physical & Self-Defense",f:"Physical & Self-Defense",k:"Boxing's plainest punch, and its most important. The jab is the lead-hand straight punch, punch number one in the gym's numbering system (odd numbers are the lead hand, even numbers the rear, power hand, so the 'one-two' is jab-then-cross): from a hands-up guard the lead fist fires straight to the target, the fist turning over to land on the first two knuckles, then returning to the guard before the opponent can counter. It is the only punch a fighter throws without opening his own guard, which is why it is thrown more than all the others combined. Its work is mostly quiet: it measures range so the heavier punches can land, breaks the opponent's timing, banks points round after round, and held out long and stiff keeps a bigger man at the end of an arm. 'Stick and move' is the craft of the boxer who would rather not be hit, and the stick is the jab. The Victorians called it the straight left, and the argument over who threw it best (Larry Holmes's long heavy jab, Joe Louis's crisp accuracy, Sonny Liston's power, Muhammad Ali's blinding speed) is itself a piece of boxing culture.",dt:"21 June 2026",h:"jab.html",img:"Straight%20Left%20Hand%20Counter,%20Peter%20Jackson%20and%20Fred%20Slavin,%20from%20the%20Boxing%20Positions%20and%20Boxers%20series%20(N266)%20issued%20by%20P.%20Lorillard%20Company%20to%20promote%20Red%20Cross%20Long%20Cut%20Tobacco%20MET%20DPB879434.jpg"},
 {no:"042",t:"Penicillin",sub:"Medicine",f:"Medicine & the Body",k:"How a contaminated dish became the first antibiotic. In September 1928 Alexander Fleming returned to his laboratory at St Mary's Hospital to find a blue-green Penicillium mould growing on a forgotten staphylococcus plate, with a clear ring around it where the bacteria had dissolved; he named the substance penicillin, found it killed common pathogens while sparing the body's own cells, but, trained as a bacteriologist rather than a chemist, could never stabilise it, and for a decade the discovery lapsed. The rescue came from Oxford, where Howard Florey, Ernst Chain, and Norman Heatley worked out how to extract and concentrate the drug, proved it on infected mice in 1940, and treated the first patient, the policeman Albert Alexander, in February 1941, only to watch him relapse and die when the tiny supply ran out. The American scale-up at a government fermentation laboratory in Peoria broke the bottleneck (corn-steep liquor, deep-tank fermentation, and a super-strain found on a mouldy cantaloupe), and by the Normandy landings of June 1944 there was enough to treat every Allied casualty who needed it. Fleming, Florey, and Chain shared the 1945 Nobel Prize, and Fleming used his lecture to warn, presciently, that careless underdosing would breed bacteria the drug could no longer kill.",dt:"20 June 2026",h:"penicillin.html",img:"Professor_Alexander_Fleming_at_work_in_his_laboratory_at_St_Mary's_Hospital,_London,_during_the_Second_World_War._D17801.jpg"},
 {no:"041",t:"Finding North by the Stars",sub:"Outdoors & Survival",f:"Outdoors & Survival",k:"How to find true north on a clear night without a compass. Everything in the sky wheels through the night except one point: Polaris, the North Star, which stands almost exactly over the Earth's north pole. The catch is that Polaris is dim, only second magnitude, so you find it by signpost rather than by hunting: the two pointer stars on the outer lip of the Big Dipper's bowl, Dubhe and Merak, throw a line that lands on Polaris about five times their own gap away, and Cassiopeia's flattened W marks the opposite side of the pole for when the Dipper rides low. Once found, drop a line from Polaris to the horizon for true north, and read its height above the horizon as your latitude (the old sailor's sextant trick). The Earth's slow twenty-six-thousand-year wobble means the job rotates: Thuban held it when the pyramids rose, Vega takes it in twelve thousand years. South of the equator there is no pole star, so the Southern Cross stands in, its long axis extended four and a half times to mark due south. Primary source: U.S. Army Field Manual 21-76, the survival manual.",dt:"19 June 2026",h:"finding-north-by-the-stars.html",img:"Steve_Ryan_-_Stars_around_Polaris_-_Day_62_(by-sa).jpg"},
 {no:"040",t:"The Wealth of Nations",sub:"Economics",f:"Civic & Money",k:"The book that founded modern economics, walked from its opening image to its most misread one. Adam Smith opens the 1776 Inquiry in a pin factory, where ten workers who split the job into about eighteen operations turn out forty-eight thousand pins a day, when one man working alone could barely make twenty: the division of labour, and his redefinition of a nation's wealth as the yearly flow of goods its labour produces rather than the gold in its sovereign's vault. The engine is self-interest, not benevolence (the butcher, the brewer, the baker); the invisible hand, the phrase that appears exactly once in the whole book, as the observation that private interest can be turned to public good under competition; Smith the Glasgow moral philosopher of The Theory of Moral Sentiments (1759), no apostle of greed; his warning that men of the same trade soon conspire against the public; and his profile and pin factory together on the British twenty-pound note from 2007 to 2020.",dt:"18 June 2026",h:"wealth-of-nations.html",img:"Adam_Smith_The_Muir_portrait.jpg"},
 {no:"039",t:"Jesse Owens",sub:"Sports",f:"Sports",k:"Four gold medals at Hitler's Olympics. The 1936 Berlin Games were staged by the Nazi regime as a showcase for racial supremacy, and a twenty-two-year-old Black American won the 100 metres, the 200 metres, the long jump, and a leg of the 4x100 relay, breaking or equalling an Olympic record in each. The Alabama sharecropper's son who became the Buckeye Bullet; the greatest forty-five minutes in sport at Ann Arbor in 1935 (three world records and a fourth tied in under an hour, a long jump that stood twenty-five years); the runway friendship with the German Luz Long; the Hitler-snub myth set against the real snub from FDR, who sent no telegram and no White House invitation; the two Jewish relay runners pulled from the team; and the return to a segregated America where he raced against horses because, as he said, you cannot eat four gold medals.",dt:"17 June 2026",h:"jesse-owens.html",img:"Jesse%20Owens%201936.jpg"},
 {no:"038",t:"Cow and Beef",sub:"Language",f:"Language & Rhetoric",k:"Why English keeps two words for the same animal: a cow in the field becomes beef on the plate, swine becomes pork, sheep becomes mutton, calf becomes veal. The Norman Conquest of 1066 set a French-speaking aristocracy over an English-speaking peasantry for three centuries; the Saxon who raised the beast kept the old Germanic name, and the Norman who ate it brought the French one to the table (beef from Old French boef, pork from porc, mutton from mouton). The deeper twist that cow and beef are cousins, both descended from one Proto-Indo-European root that walked north into Germanic and south through Latin before meeting again on an English plate; Walter Scott's jester Wamba making the point in Ivanhoe (1819); and the wider French and Latin overlay that gave English its formal register (ask and inquire, kingly and royal and regal, freedom and liberty).",dt:"16 June 2026",h:"cow-and-beef.html",img:"Bayeux_Tapestry_scene55_William_Hastings_battlefield.jpg"},
 {no:"037",t:"Backgammon",sub:"Backgammon",f:"Games & Pastimes",k:"The oldest game still played for pleasure, walked from the board to the doubling cube. Fifteen checkers a side race in opposite directions around twenty-four points; you build walls by stacking two or more on a point, hit a lone enemy blot to send it to the bar, and bear off once all your checkers are home, with a gammon worth double. The deep history of the tables family (the Royal Game of Ur, the Roman game of twelve lines, Emperor Zeno's ruinous dice, Hoyle's 1753 treatise); the doubling cube invented in 1920s New York that turned the game into a contest of estimating your odds (take a double only if you will win at least one in four); the 1960s boom under Prince Alexis Obolensky; Paul Magriel's 1976 Bible and his X-22 nickname; and TD-Gammon, the 1992 neural network that taught itself the game and previewed the machine learning that would later conquer Go.",dt:"15 June 2026",h:"backgammon.html",img:"Backgammon_board.jpg"},
 {no:"036",t:"The Maillard Reaction",sub:"Cooking",f:"Food",k:"The browning reaction behind almost everything that smells like cooking: the crust on a steak, the gold of toast, the color of coffee, dark beer, and maple syrup. Amino acids and reducing sugars recombine over heat (around 150 Celsius) into hundreds of new brown pigments (melanoidins) and aroma compounds, with the amino acid setting the smell more than the sugar; why the surface has to be dry to brown at all, since boiling water pins it at 100 Celsius; the distinction from caramelization, which is sugar alone; Louis-Camille Maillard's 1912 discovery while trying to synthesize proteins, the wartime revival, and John E. Hodge's 1953 three-stage mechanism. Jean-Marie Lehn called it the most widely practiced chemical reaction on Earth.",dt:"14 June 2026",h:"maillard-reaction.html",img:"Juicy%20steak%20cooked%20to%20perfection%20on%20a%20black%20stone.jpg"},
 {no:"035",t:"The Octopus",sub:"Marine Life",f:"The Animal World",k:"The cephalopod that built a complex mind on a body plan unlike ours: a boneless body whose only hard part is the beak, three hearts and blue copper-based blood (hemocyanin), and about five hundred million neurons with close to two-thirds in the arms, so each arm can taste, feel, and decide on its own. Peter Godfrey-Smith's Other Minds and the line that split from ours roughly 600 million years ago; skin that changes color and texture in a fifth of a second through chromatophores even though the animal is colorblind (Roger Hanlon's 177 camouflage decisions an hour); the veined octopus carrying coconut shells, the first tool use recorded in an invertebrate; and a one-to-two-year life that ends after a single brood, now written into UK law as sentient.",dt:"14 June 2026",h:"octopus.html",img:"Octopus%20vulgaris%2002.JPG"},
 {no:"034",t:"Sharpening a Knife",sub:"Practical Skills",f:"Practical Skills",k:"How to put a real edge back on a blade with a stone. The difference between honing (realigning the edge, done often) and sharpening (grinding fresh steel, done seldom); the whetstone and its grit grades (coarse ~400 to fine 3,000-6,000); the all-important angle (about 20 degrees per side for a Western knife, 15 for a Japanese one) and the marker trick for finding it; the burr, the wire of steel that proves you have reached the apex; the five-step procedure (set the angle, raise a burr, match the other side, climb the grits, finish and strop); and the paper-and-tomato test.",dt:"13 June 2026",h:"sharpening-a-knife.html",img:"Whetstone%20Knife%20Sharpening%2C%202015-%2801%29.jpg"},
 {no:"033",t:"The Trench Coat",sub:"Objects & Style",f:"Objects & Style",k:"How to read a trench coat: the gun flap, D-rings, epaulettes, and buckled cuffs as a kit list from the Western Front; gabardine, the breathable waterproof cloth Thomas Burberry invented in 1879 and patented in 1888; the Tielocken forerunner (1912), the War Office design submitted in 1901, and Aquascutum's rival claim to the 1850s; the officers-only private-purchase rule and the generous cut sized over the British Warm; and the afterlife from Casablanca and Marlene Dietrich to the modern staple.",dt:"12 June 2026",h:"trench-coat.html",img:"Man%20wearing%20trenchcoat%20%28cropped%29.jpg"},
 {no:"032",t:"The Points of Sail",sub:"Sailing",f:"Outdoor Pursuits",k:"A sailboat cannot sail into the wind, but it can sail almost everywhere else. The points of sail named in order as the boat turns away from the wind (in irons, close-hauled, close reach, beam reach, broad reach, running), the no-go zone, tacking versus jibing and the crew calls (\"ready about\", \"helm's a-lee\", \"jibe-ho\"), and the nautical idioms minted on the angles (\"by and large\", \"taken aback\").",dt:"11 June 2026",h:"points-of-sail.html",img:"Moonbeam%20-%20Brest%202008-10.jpg"},
 {no:"031",t:"The Transistor",sub:"Technology",f:"Technology",k:"Bardeen and Brattain's point-contact device of December 1947 (the plastic triangle, the gold foil, the germanium slab, Shockley's \"magnificent Christmas present\"), the page-46 press debut, the junction transistor born of a patent grudge, the 1956 Nobel, and the road west: Shockley's lab, the traitorous eight, Fairchild, Intel, Moore's law, and the naming of Silicon Valley in 1971.",dt:"10 June 2026",h:"transistor.html",img:"Replica-of-first-transistor.jpg"},
 {no:"030",t:"The Cigar",sub:"Smoke",f:"Smoke",k:"How to read a cigar: the three tobaccos (wrapper, binder, filler), the size system (length in inches plus ring gauge in sixty-fourths), the origin countries (Cuba, Dominican Republic, Nicaragua, Honduras), and the cut-light-draw-rest mechanics. Anchored on the Montecristo No. 4 petit corona, the brand named in 1935 for the Dumas novel the lector read aloud to the rollers, now a quarter of all Habanos sales.",dt:"9 June 2026",h:"cigar.html",img:"MonteCristo%20Cigar.jpg"},
 {no:"029",t:"The Toast",sub:"Etiquette",f:"Social Living",k:"How a piece of spiced bread floating in Elizabethan wine gave the toast its name (Shakespeare's Falstaff: \"put a toast in't\"), how the honored lady became the \"toast of the town\" around 1700, the Greek symposium and Roman libation behind the custom, the clink-against-poison myth retired, and Emily Post's rules for giving one: stand, keep it under two minutes, one story, and never drink to yourself.",dt:"8 June 2026",h:"toast.html",img:"Frans%20Hals%20-%20The%20Merry%20Drinker%20-%20WGA11095.jpg"},
 {no:"028",t:"The Circulation of the Blood",sub:"Medicine",f:"Medicine & the Body",k:"How William Harvey overturned fifteen centuries of Galen with arithmetic: the left ventricle holds two ounces, the heart beats seventy times a minute, and no body could make or burn that much blood, so it must travel in a circle. The 1628 De Motu Cordis, the forearm-ligature proof, and Malpighi's capillaries closing the loop in 1661.",dt:"8 June 2026",h:"circulation-of-the-blood.html",img:"William_Harvey_2.jpg"},

 {key:"Craft",slug:"craft",fields:["Practical Skills","Outdoors & Survival","Outdoor Pursuits","Physical & Self-Defense","Games & Pastimes","Sports"]},
 {key:"The World",slug:"world",fields:["Objects & Style","Civic & Money","Social Living","The Animal World"]}
];
var F2SLUG={};DOMAINS.forEach(function(D){D.fields.forEach(function(f){F2SLUG[f]=D.slug;});});
var TOTAL_FIELDS=0;DOMAINS.forEach(function(D){TOTAL_FIELDS+=D.fields.length;});
function slugOf(L){return F2SLUG[L.f]||"thought";}
function fp(n,w){return "https://commons.wikimedia.org/wiki/Special:FilePath/"+n+"?width="+w;}
function domLessons(s){return LESSONS.filter(function(L){return slugOf(L)===s;});}
var nLessons=LESSONS.length;
var fieldsEntered=0;DOMAINS.forEach(function(D){D.fields.forEach(function(f){if(LESSONS.some(function(L){return L.f===f;}))fieldsEntered++;});});
document.getElementById('mast-meta').innerHTML='The Library<br>'+nLessons+' lessons';
document.getElementById('foot-stats').innerHTML='Compiled by Matthew Yellin &middot; Est. May 2026 &middot; '+nLessons+' lessons &middot; '+fieldsEntered+' of '+TOTAL_FIELDS+' fields';
var libPills='<button class="pill on" data-fam="">All &middot; '+nLessons+'</button>';
DOMAINS.forEach(function(D){var n=domLessons(D.slug).length;if(n)libPills+='<button class="pill" data-fam="'+D.slug+'">'+D.key+' &middot; '+n+'</button>';});
document.getElementById('lib-pills').innerHTML=libPills;
var libFam='',libQ='',libView='index';
function lcard(L){return '<a class="lcard fam-'+slugOf(L)+'" href="'+L.h+'"><span class="lplate"><img loading="lazy" src="'+fp(L.img,500)+'" alt="'+L.t+'"></span><span class="lmeta"><span class="lno">No. '+L.no+'</span> &middot; '+L.dt+'</span><span class="ltag">'+L.sub+'</span><span class="ltt">'+L.t+'</span><span class="ldk">'+L.k+'</span></a>';}
function renderLib(){
  var list=LESSONS.filter(function(L){var okF=!libFam||slugOf(L)===libFam;var okQ=!libQ||(L.t+' '+L.sub+' '+L.f+' '+L.k).toLowerCase().indexOf(libQ)>-1;return okF&&okQ;});
  var box=document.getElementById('lib-results');
  if(!list.length){box.innerHTML='';document.getElementById('lib-empty').style.display='block';return;}
  document.getElementById('lib-empty').style.display='none';
  function idxrow(L,fam){return '<a class="idxrow fam-'+fam+'" href="'+L.h+'"><span class="n">No. '+L.no+'</span><span class="t">'+L.t+'<small>'+L.sub+'</small></span><span class="d">'+L.dt+'</span></a>';}
  if(libView==='gallery'){box.innerHTML='<div class="lgrid">'+list.map(lcard).join('')+'</div>';}
  else if(!libFam){
    // "All": one flat list, newest first (LESSONS is already in accession-descending order)
    box.innerHTML='<div class="idxgroup">'+list.map(function(L){return idxrow(L,slugOf(L));}).join('')+'</div>';
  }
  else{var html='';DOMAINS.forEach(function(D){if(D.slug!==libFam)return;var g=list.slice();g.sort(function(a,b){return a.no<b.no?1:-1;});
    html+='<div class="idxgroup fam-'+D.slug+'"><div class="idx-h">'+D.key+'<span class="c">'+g.length+'</span></div>'+g.map(function(L){return idxrow(L,D.slug);}).join('')+'</div>';});box.innerHTML=html;}
}
document.getElementById('lib-pills').addEventListener('click',function(e){var b=e.target.closest('.pill');if(!b)return;libFam=b.getAttribute('data-fam');[].slice.call(this.children).forEach(function(p){p.classList.toggle('on',p===b);});renderLib();});
document.getElementById('search').addEventListener('input',function(e){libQ=e.target.value.trim().toLowerCase();renderLib();});
document.getElementById('lib-view').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;libView=b.getAttribute('data-v');[].slice.call(this.children).forEach(function(p){p.classList.toggle('on',p===b);});renderLib();});
renderLib();
</script>
</body>
</html>
